<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>渊迂电视台 · 假直播系统 | 随机轮播+标识插播</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            padding: 20px;
        }

        .live-container {
            max-width: 1280px;
            width: 100%;
            background: #000000;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .video-stage {
            position: relative;
            background: #000;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        .video-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            transition: opacity 0.2s ease;
        }
        .video-layer.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .video-layer.visible {
            opacity: 1;
            pointer-events: auto;
            z-index: 2;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 直播角标 - 右上角 */
        .live-badge {
            position: absolute;
            top: 18px;
            right: 20px;
            z-index: 20;
            background: rgba(255, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .live-dot {
            width: 12px;
            height: 12px;
            background-color: #ff3b3b;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* 台标 - 左上角缩小版 */
        .station-logo {
            position: absolute;
            top: 16px;
            left: 20px;
            z-index: 25;
            width: 64px;
            height: auto;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(3px);
            border-radius: 12px;
            padding: 4px 6px;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .station-logo img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
        }
        @media (max-width: 640px) {
            .station-logo { width: 50px; top: 12px; left: 12px; padding: 3px 5px; }
            .live-badge { top: 12px; right: 12px; padding: 4px 10px; font-size: 0.7rem; }
        }

        /* 信息栏 */
        .info-panel {
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(12px);
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.15);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .program-info {
            flex: 2;
        }
        .current-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            margin-bottom: 4px;
        }
        .program-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #9aaef5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        .next-info {
            flex: 1;
            text-align: right;
            border-left: 1px solid rgba(255,255,255,0.2);
            padding-left: 20px;
        }
        .next-label {
            font-size: 0.7rem;
            color: #8e9aaf;
        }
        .next-title {
            font-weight: 600;
            color: #cbd5ff;
            font-size: 0.9rem;
        }
        .control-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
        }
        .control-btn:hover:not(:disabled) {
            background: #ff4d4d;
            transform: scale(1.02);
        }
        .control-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .ident-note {
            background: #ffa50030;
            border-left: 3px solid #ffaa33;
            padding-left: 10px;
            margin-top: 4px;
            font-size: 0.7rem;
            color: #ffd966;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            flex-direction: column;
            gap: 12px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #ff4d4d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 640px) {
            .program-title { font-size: 1rem; }
            .info-panel { padding: 12px 16px; }
            .next-title { font-size: 0.75rem; }
        }
        .sound-tip {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.7rem;
            color: #ccc;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="live-container">
    <div class="video-stage" id="videoStage">
        <!-- 双缓冲视频层 -->
        <div id="videoContainer1" class="video-layer visible">
            <video id="video1" preload="auto" playsinline></video>
        </div>
        <div id="videoContainer2" class="video-layer hidden">
            <video id="video2" preload="auto" playsinline></video>
        </div>
        
        <!-- 直播角标 (右上角) -->
        <div class="live-badge">
            <span class="live-dot"></span>
            <span>渊迂轮播</span>
        </div>
        
        <!-- 台标 (左上角) -->
        <div class="station-logo">
            <img src="https://origin.picgo.net/2026/04/04/knockout6c3d285437921eb2.png" alt="YRTN台标" loading="eager">
        </div>
        
        <!-- 加载遮罩 -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="spinner"></div>
            <div>加载节目数据 & 标识配置中...</div>
            <div style="font-size:0.8rem; opacity:0.7;">正在获取节目单及台内标识</div>
        </div>
        <div class="sound-tip">🔊 已开启声音</div>
    </div>

    <div class="info-panel">
        <div class="program-info">
            <div class="current-label">📺 正在直播</div>
            <div class="program-title" id="currentProgramName">-- 加载数据中 --</div>
            <div class="ident-note" id="identNote" style="display: none;">✨ 标识片段播放中 ✨</div>
        </div>
        <div class="next-info">
            <div class="next-label">⏩ 即将播出</div>
            <div class="next-title" id="nextProgramName">-</div>
        </div>
        <button id="startBtn" class="control-btn" disabled>⏳ 加载中...</button>
    </div>
    <div style="padding: 8px 24px 16px 24px; font-size: 0.7rem; color: #6c7a8e; background: #03060c; border-top: 1px solid #1e2a3a; display: flex; justify-content: space-between;">
        <span>📡 随机轮播 | 每个节目后插播标识 | 双缓冲无缝</span>
        <span>⚡ 有声直播 · 自动连播</span>
    </div>
</div>

<script>
    // ======================= 配置 =======================
    const PROGRAM_JSON_URL = './knockknock.json';
    const IDENT_JSON_URL = './yrtnident.json';
    
    // 全局数据
    let allPrograms = [];      // { displayName, url, showTitle, episodeTitle }
    let identList = [];        // [{ name, url }]
    let playSequence = [];     // [{ type, displayName, url, ... }]
    let totalItems = 0;
    
    // 播放器核心变量 (纯视频)
    let activeVideoElem = null;
    let standbyVideoElem = null;
    let activeContainer = null;
    let standbyContainer = null;
    let currentIndex = 0;
    let isLiveStarted = false;
    let isSwitching = false;
    
    // DOM 元素
    const video1 = document.getElementById('video1');
    const video2 = document.getElementById('video2');
    const container1 = document.getElementById('videoContainer1');
    const container2 = document.getElementById('videoContainer2');
    const startBtn = document.getElementById('startBtn');
    const currentProgramNameSpan = document.getElementById('currentProgramName');
    const nextProgramNameSpan = document.getElementById('nextProgramName');
    const identNoteSpan = document.getElementById('identNote');
    const loadingOverlay = document.getElementById('loadingOverlay');
    
    function showLoading(show) {
        if(loadingOverlay) loadingOverlay.style.display = show ? 'flex' : 'none';
    }
    
    // 判断是否为有效直链 (排除B站)
    function isValidDirectVideo(url) {
        if (!url || typeof url !== 'string') return false;
        // 禁止B站iframe
        if (url.includes('player.bilibili.com') || url.includes('bilibili.com/player')) return false;
        return url.match(/^https?:\/\//) !== null;
    }
    
    // 提取所有节目 (只保留直链)
    function extractProgramsFromJson(jsonData) {
        const programs = [];
        if (!jsonData || !jsonData.categories) return programs;
        for (const category of jsonData.categories) {
            if (!category.shows) continue;
            for (const show of category.shows) {
                const showTitle = show.title || "未命名栏目";
                if (!show.episodes) continue;
                for (const ep of show.episodes) {
                    let videoUrl = ep.videoUrl;
                    if (!videoUrl) continue;
                    if (!isValidDirectVideo(videoUrl)) {
                        console.warn(`[跳过] ${showTitle} - ${ep.title} 不是直链或为B站链接`);
                        continue;
                    }
                    const episodeTitle = ep.title || "未命名剧集";
                    programs.push({
                        displayName: `${showTitle} - ${episodeTitle}`,
                        url: videoUrl,
                        showTitle: showTitle,
                        episodeTitle: episodeTitle
                    });
                }
            }
        }
        console.log(`[节目] 共提取 ${programs.length} 个可播放直链节目`);
        return programs;
    }
    
    // 加载标识 (按照用户提供的 yrtnident.json 格式)
    async function loadIdents() {
        try {
            const response = await fetch(IDENT_JSON_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const json = await response.json();
            let idents = [];
            // 解析嵌套结构: categories[0].shows[0].episodes[].videoUrl
            if (json.categories && Array.isArray(json.categories)) {
                for (const cat of json.categories) {
                    if (cat.shows) {
                        for (const show of cat.shows) {
                            if (show.episodes) {
                                for (const ep of show.episodes) {
                                    if (ep.videoUrl && isValidDirectVideo(ep.videoUrl)) {
                                        idents.push({
                                            name: `台标 ${ep.id || 'IDENT'}`,
                                            url: ep.videoUrl
                                        });
                                    }
                                }
                            }
                        }
                    }
                }
            }
            // 兼容直接数组格式
            if (idents.length === 0 && Array.isArray(json)) {
                idents = json.filter(i => i.url && isValidDirectVideo(i.url)).map(i => ({ name: i.name || '标识', url: i.url }));
            }
            console.log(`[标识] 加载 ${idents.length} 个标识视频`);
            return idents;
        } catch (err) {
            console.warn("标识文件加载失败", err);
            return [];
        }
    }
    
    // 随机排序数组 (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    // 构建轮播序列: 随机节目 + 每个节目后插一个标识 (标识循环使用)
    function buildPlaylistWithIdents(programs, idents) {
        const shuffledPrograms = shuffleArray([...programs]);
        const seq = [];
        if (shuffledPrograms.length === 0) return seq;
        // 如果没有标识，则纯节目轮播
        if (idents.length === 0) {
            for (let p of shuffledPrograms) {
                seq.push({ type: 'program', displayName: p.displayName, url: p.url });
            }
            return seq;
        }
        let identCursor = 0;
        for (let p of shuffledPrograms) {
            seq.push({ type: 'program', displayName: p.displayName, url: p.url });
            const ident = idents[identCursor % idents.length];
            seq.push({
                type: 'ident',
                displayName: `🏷️ ${ident.name}`,
                url: ident.url
            });
            identCursor++;
        }
        return seq;
    }
    
    function getPlaylistItem(index) {
        if (totalItems === 0) return null;
        const safeIdx = ((index % totalItems) + totalItems) % totalItems;
        return playSequence[safeIdx];
    }
    
    // 获取下一个「节目」(跳过标识)
    function getNextProgramDisplay(currentIdx) {
        let offset = 1;
        while (offset <= totalItems) {
            const item = getPlaylistItem(currentIdx + offset);
            if (!item) return null;
            if (item.type === 'program') return item.displayName;
            offset++;
        }
        return null;
    }
    
    function updateUIByIndex(idx) {
        const current = getPlaylistItem(idx);
        if (!current) return;
        if (current.type === 'ident') {
            identNoteSpan.style.display = 'inline-block';
            currentProgramNameSpan.innerHTML = current.displayName;
        } else {
            identNoteSpan.style.display = 'none';
            currentProgramNameSpan.innerHTML = current.displayName;
        }
        const nextProg = getNextProgramDisplay(idx);
        nextProgramNameSpan.innerText = nextProg || "即将播出";
    }
    
    // 预加载视频到指定元素
    function preloadVideo(videoElem, url) {
        if (!videoElem || !url) return;
        if (videoElem.src === url && videoElem.readyState >= 2) return;
        videoElem.pause();
        videoElem.muted = false;
        videoElem.preload = 'auto';
        videoElem.src = url;
        videoElem.load();
    }
    
    // 视频结束事件 -> 切换
    function onVideoEnded() {
        if (!isLiveStarted || isSwitching) return;
        performSeamlessSwitch();
    }
    
    // 核心无缝切换 (双video)
    async function performSeamlessSwitch() {
        if (isSwitching || !isLiveStarted) return;
        isSwitching = true;
        
        const nextItem = getPlaylistItem(currentIndex + 1);
        if (!nextItem) {
            isSwitching = false;
            return;
        }
        
        // 确保 standby 视频已经预加载了下一个内容
        if (!standbyVideoElem || !standbyVideoElem.src) {
            console.warn("待机视频未就绪，尝试重新预加载");
            preloadVideo(standbyVideoElem, nextItem.url);
            await new Promise(r => setTimeout(r, 200));
        }
        
        // 交换图层
        activeContainer.classList.remove('visible');
        activeContainer.classList.add('hidden');
        standbyContainer.classList.remove('hidden');
        standbyContainer.classList.add('visible');
        
        // 交换引用
        const tempVideo = activeVideoElem;
        const tempContainer = activeContainer;
        activeVideoElem = standbyVideoElem;
        activeContainer = standbyContainer;
        standbyVideoElem = tempVideo;
        standbyContainer = tempContainer;
        
        // 播放新的活动视频
        try {
            activeVideoElem.muted = false;
            await activeVideoElem.play();
        } catch (err) {
            console.warn("播放失败", err);
        }
        
        // 更新索引和UI
        currentIndex = (currentIndex + 1) % totalItems;
        updateUIByIndex(currentIndex);
        
        // 旧视频停止，并预加载未来下一个节目
        standbyVideoElem.pause();
        const nextFutureIndex = (currentIndex + 1) % totalItems;
        const futureItem = getPlaylistItem(nextFutureIndex);
        if (futureItem && standbyVideoElem) {
            preloadVideo(standbyVideoElem, futureItem.url);
        }
        
        // 重新绑定ended事件
        activeVideoElem.removeEventListener('ended', onVideoEnded);
        activeVideoElem.addEventListener('ended', onVideoEnded);
        
        isSwitching = false;
    }
    
    // 开始直播
    async function startLive() {
        if (isLiveStarted) return;
        if (playSequence.length === 0) {
            alert("播放列表为空，请检查数据源");
            return;
        }
        
        totalItems = playSequence.length;
        currentIndex = 0;
        
        // 重置容器显示
        container1.classList.remove('visible', 'hidden');
        container2.classList.remove('visible', 'hidden');
        container1.classList.add('visible');
        container2.classList.add('hidden');
        
        activeVideoElem = video1;
        standbyVideoElem = video2;
        activeContainer = container1;
        standbyContainer = container2;
        
        const firstItem = getPlaylistItem(0);
        const secondItem = getPlaylistItem(1);
        if (!firstItem) throw new Error("无首播内容");
        
        // 清理旧事件
        activeVideoElem.removeEventListener('ended', onVideoEnded);
        standbyVideoElem.removeEventListener('ended', onVideoEnded);
        
        // 加载第一个视频并播放
        preloadVideo(activeVideoElem, firstItem.url);
        try {
            activeVideoElem.muted = false;
            await activeVideoElem.play();
        } catch (err) {
            console.warn("自动播放失败，可能需要用户交互", err);
            alert("由于浏览器策略，请再次点击「开始直播」按钮");
            return;
        }
        
        // 预加载第二个视频
        if (secondItem) {
            preloadVideo(standbyVideoElem, secondItem.url);
        }
        
        updateUIByIndex(0);
        activeVideoElem.addEventListener('ended', onVideoEnded);
        
        isLiveStarted = true;
        startBtn.innerText = '⚡ 直播中';
        startBtn.disabled = true;
        
        // 启动守护: 定期检查活动视频是否意外暂停
        startGuardInterval();
    }
    
    let guardTimer = null;
    function startGuardInterval() {
        if (guardTimer) clearInterval(guardTimer);
        guardTimer = setInterval(() => {
            if (!isLiveStarted) return;
            if (activeVideoElem && activeVideoElem.paused && !activeVideoElem.ended && !isSwitching) {
                activeVideoElem.play().catch(e=>{});
            }
            if (standbyVideoElem && standbyVideoElem.src && standbyVideoElem.readyState < 2) {
                standbyVideoElem.load();
            }
        }, 3000);
    }
    
    function resetAndStop() {
        if (isLiveStarted) {
            if (activeVideoElem) activeVideoElem.pause();
            if (standbyVideoElem) standbyVideoElem.pause();
            activeVideoElem?.removeEventListener('ended', onVideoEnded);
            isLiveStarted = false;
        }
        if (guardTimer) clearInterval(guardTimer);
        startBtn.innerText = '▶ 开始直播';
        startBtn.disabled = false;
        currentProgramNameSpan.innerHTML = '-- 就绪 --';
        nextProgramNameSpan.innerHTML = '加载完成';
        identNoteSpan.style.display = 'none';
        container1.classList.add('visible');
        container1.classList.remove('hidden');
        container2.classList.add('hidden');
        container2.classList.remove('visible');
    }
    
    // 主初始化
    async function initApp() {
        showLoading(true);
        startBtn.disabled = true;
        try {
            const [programsJson, idents] = await Promise.all([
                fetch(PROGRAM_JSON_URL).then(r => r.json()),
                loadIdents()
            ]);
            const programs = extractProgramsFromJson(programsJson);
            if (programs.length === 0) throw new Error("没有提取到任何有效的直链视频节目");
            allPrograms = programs;
            identList = idents;
            playSequence = buildPlaylistWithIdents(allPrograms, identList);
            totalItems = playSequence.length;
            console.log(`序列构建完成: 总项=${totalItems} (节目${allPrograms.length}, 标识${identList.length}个循环)`);
            showLoading(false);
            startBtn.disabled = false;
            startBtn.innerText = '▶ 开始直播';
            currentProgramNameSpan.innerHTML = '随机节目单就绪';
            const firstProg = getNextProgramDisplay(-1);
            nextProgramNameSpan.innerText = firstProg || '节目';
        } catch (err) {
            console.error(err);
            showLoading(false);
            currentProgramNameSpan.innerHTML = '数据加载失败';
            nextProgramNameSpan.innerHTML = '请检查JSON文件';
            startBtn.disabled = true;
            startBtn.innerText = '❌ 错误';
            const stage = document.getElementById('videoStage');
            const errDiv = document.createElement('div');
            errDiv.className = 'loading-overlay';
            errDiv.style.background = '#aa0000aa';
            errDiv.innerHTML = `<div>⚠️ 数据加载失败</div><div style="font-size:0.8rem">${err.message}</div><button id="reloadBtn" style="margin-top:12px;padding:6px 16px;border-radius:20px;border:none;">重试</button>`;
            if(!document.querySelector('.manual-error')) stage.appendChild(errDiv);
            document.getElementById('reloadBtn')?.addEventListener('click',()=> location.reload());
        }
    }
    
    startBtn.addEventListener('click', async () => {
        if (isLiveStarted) return;
        if (playSequence.length === 0) {
            alert("播放序列未准备好，请刷新页面重试");
            return;
        }
        await startLive();
    });
    
    initApp();
    
    // 双击右上角live-badge重置直播
    document.querySelector('.live-badge')?.addEventListener('dblclick', () => {
        if (isLiveStarted && confirm("重置直播并回到起始节目？")) {
            resetAndStop();
        }
    });
</script>
</body>
</html>
