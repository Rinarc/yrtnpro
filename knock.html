<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YRTN+ | 开始观赏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== 原有样式 ========== */
        :root {
            --primary: #E50914; 
            --secondary: #0071EB;
            --accent: #00A8E1;
            --dark: #141414;
            --darker: #0A0A0A;
            --light: #E5E5E5;
            --gray: #808080;
            --success: #1DB954;
            
            --gradient-primary: linear-gradient(135deg, #E50914 0%, #B81D24 100%);
            --gradient-secondary: linear-gradient(135deg, #0071EB 0%, #0056B3 100%);
            --gradient-accent: linear-gradient(135deg, #00A8E1 0%, #0066CC 100%);
            --gradient-hero: linear-gradient(to bottom, rgba(20, 20, 20, 0.4), rgba(20, 20, 20, 0.9) 80%, #141414);
            
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.5);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.7);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.9);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            
            --transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-fast: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 90px;
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            background: rgba(229, 9, 20, 0.2);
            border-radius: 50%;
            animation: float linear infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }
        
        .app-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            transform: translateY(0);
            transition: var(--transition-fast);
        }
        
        .app-header.hidden {
            transform: translateY(-100%);
        }
        
        .branding {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            background: var(--gradient-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3);
            transition: var(--transition);
        }
        
        .logo:hover {
            transform: rotate(15deg) scale(1.1);
        }
        
        .brand-name {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(to right, var(--light), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }
        
        .nav-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .nav-icon {
            font-size: 1.3rem;
            color: var(--light);
            position: relative;
            transition: var(--transition-fast);
            opacity: 0.8;
        }
        
        .nav-icon:hover {
            color: var(--primary);
            opacity: 1;
            transform: translateY(-3px);
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            padding: 12px;
            border-radius: 50px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            width: calc(100% - 40px);
            max-width: 500px;
            justify-content: space-around;
            transition: var(--transition);
        }
        
        .bottom-nav.hidden {
            transform: translateX(-50%) translateY(100px);
            opacity: 0;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--light);
            text-decoration: none;
            font-size: 0.8rem;
            transition: var(--transition-fast);
            opacity: 0.6;
            position: relative;
        }
        
        .nav-item.active {
            opacity: 1;
            color: var(--primary);
            transform: translateY(-10px);
        }
        
        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -10px;
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }
        
        .nav-item i {
            font-size: 1.4rem;
            margin-bottom: 4px;
            transition: var(--transition-fast);
        }
        
        .nav-item.active i {
            transform: scale(1.2);
        }
        
        .nav-item:hover {
            opacity: 1;
            color: var(--primary);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }
        
        .section-title {
            position: relative;
            margin: 30px 0 25px;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--light);
            display: inline-block;
            padding-left: 15px;
        }
        
        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--gradient-primary);
            border-radius: 4px;
        }
        
        .content-area {
            min-height: 70vh;
            position: relative;
        }
        
        .hero-banner {
            position: relative;
            height: 70vh;
            min-height: 500px;
            margin: -20px -20px 30px;
            overflow: hidden;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        }
        
        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.7), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1489599809505-7c8e45190e43?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }
        
        .hero-content {
            position: absolute;
            bottom: 20%;
            left: 5%;
            max-width: 600px;
            z-index: 2;
        }
        
        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            line-height: 1.1;
        }
        
        .hero-description {
            font-size: 1.2rem;
            margin-bottom: 25px;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .hero-actions {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-fast);
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: #F40612;
            transform: scale(1.05);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        
        .category-card {
            background: var(--darker);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            height: 250px;
        }
        
        .category-card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: var(--shadow-lg);
        }
        
        .category-image {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: var(--transition);
            transform-origin: top center;
        }
        
        .category-card:hover .category-image {
            transform: scale(1.1);
        }
        
        .category-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            z-index: 2;
        }
        
        .category-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .category-count {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .shows-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .show-card {
            background: var(--darker);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            cursor: pointer;
        }
        
        .show-card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: var(--shadow-lg);
        }
        
        .show-image {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .show-info {
            padding: 20px;
        }
        
        .show-title {
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--light);
            font-size: 1.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .show-description {
            color: var(--light);
            opacity: 0.7;
            font-size: 0.95rem;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .show-meta {
            display: flex;
            justify-content: space-between;
            color: var(--light);
            opacity: 0.7;
            font-size: 0.85rem;
        }
        
        .content-row {
            margin-bottom: 40px;
        }
        
        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .row-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .row-controls {
            display: flex;
            gap: 10px;
        }
        
        .row-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--light);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        
        .row-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .row-content {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 0;
            scrollbar-width: none;
        }
        
        .row-content::-webkit-scrollbar {
            display: none;
        }
        
        .row-item {
            flex: 0 0 auto;
            width: 250px;
            background: var(--darker);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }
        
        .row-item:hover {
            transform: scale(1.05);
        }
        
        .row-item-image {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
        }
        
        .row-item-info {
            padding: 15px;
        }
        
        .row-item-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .row-item-meta {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        
        .player-container {
            margin-top: 30px;
            background: var(--darker);
            border-radius: var(--radius-md);
            padding: 30px;
            box-shadow: var(--shadow-sm);
        }
        
        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: var(--radius-sm);
            background: var(--dark);
        }
        
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .player-info {
            margin-top: 25px;
        }
        
        .player-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .player-meta {
            display: flex;
            justify-content: space-between;
            color: var(--light);
            opacity: 0.7;
            font-size: 0.95rem;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .player-description {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--light);
            opacity: 0.8;
        }
        
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--secondary);
            font-weight: 600;
            margin-bottom: 25px;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        
        .back-button:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }
        
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            grid-column: 1 / -1;
        }
        
        .loading {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }
        
        .loading div {
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            animation: loading 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            transform-origin: 40px 40px;
        }
        
        .loading div:nth-child(1) {
            animation-delay: -0.036s;
            background: var(--primary);
        }
        
        .loading div:nth-child(2) {
            animation-delay: -0.072s;
            background: var(--secondary);
        }
        
        .loading div:nth-child(3) {
            animation-delay: -0.108s;
            background: var(--accent);
        }
        
        .loading div:nth-child(4) {
            animation-delay: -0.144s;
            background: var(--success);
        }
        
        @keyframes loading {
            0% { transform: rotate(0deg) scale(0.8); opacity: 1; }
            100% { transform: rotate(360deg) scale(1.2); opacity: 0.5; }
        }

        /* ===== 选集卡片模块 (封面网格) ===== */
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .episode-card {
            background: var(--darker);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-fast);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .episode-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .episode-thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-size: cover;
            background-position: center;
            background-color: var(--gray);
            transition: transform 0.3s ease;
        }

        .episode-card:hover .episode-thumb {
            transform: scale(1.05);
        }

        .episode-info {
            padding: 15px;
        }

        .episode-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 8px;
            color: var(--light);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .episode-date {
            font-size: 0.8rem;
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 分享按钮样式 */
        .share-btn {
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0 10px;
            opacity: 0.7;
            transition: var(--transition-fast);
        }
        .share-btn:hover {
            opacity: 1;
            color: var(--primary);
            transform: scale(1.1);
        }
        .player-meta-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        /* 自定义播放器样式 (保持不变) */
        .custom-player {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        .custom-player video {
            width: 100%;
            display: block;
            cursor: pointer;
        }
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            display: flex;
            align-items: center;
            padding: 15px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 10;
        }
        .custom-player:hover .player-controls,
        .custom-player.controls-visible .player-controls {
            transform: translateY(0);
        }
        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: var(--transition-fast);
            margin: 0 5px;
        }
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        .play-pause-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
        }
        .progress-container {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            margin: 0 15px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 3px;
            transition: width 0.1s linear;
            position: relative;
        }
        .progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .progress-container:hover .progress-bar::after {
            opacity: 1;
        }
        .time-display {
            color: white;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
            font-family: monospace;
        }
        .volume-control {
            display: flex;
            align-items: center;
            margin: 0 10px;
        }
        .volume-slider {
            width: 80px;
            margin-left: 8px;
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
        }
        .speed-menu {
            position: relative;
            display: inline-block;
        }
        .speed-btn {
            background: none;
            border: none;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.5);
        }
        .speed-options {
            position: absolute;
            bottom: 100%;
            left: 0;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 4px;
            padding: 5px 0;
            display: none;
            min-width: 100px;
            z-index: 20;
        }
        .speed-options.show {
            display: block;
        }
        .speed-option {
            display: block;
            width: 100%;
            padding: 8px 15px;
            background: none;
            border: none;
            color: white;
            text-align: left;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .speed-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .speed-option.active {
            color: var(--primary);
            font-weight: 500;
        }
        .fullscreen-btn {
            margin-left: 10px;
        }
        .player-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 5;
            cursor: pointer;
        }
        .player-overlay.visible {
            opacity: 1;
        }
        .overlay-play-btn {
            font-size: 4rem;
            color: white;
            opacity: 0.8;
            transition: var(--transition-fast);
        }
        .overlay-play-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            display: none;
            z-index: 15;
        }
        .loading-indicator.visible {
            display: block;
        }
        .loading-spinner {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .categories-grid, .shows-grid, .episodes-grid {
                grid-template-columns: 1fr;
            }
            .hero-title { font-size: 2.5rem; }
            .episode-thumb { aspect-ratio: 16/9; }
        }

        /* ===== 新增：历史卡片 ===== */
        .history-card {
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--primary);
            border-radius: 0 8px 8px 0;
            padding: 8px 16px;
            margin: 10px 0 0 0;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: var(--transition-fast);
            max-width: 100%;
            overflow: hidden;
            position: relative;
            z-index: 500;
        }
        .history-card:hover {
            transform: translateX(5px);
            background: var(--darker);
        }
        .history-thumb {
            width: 50px;
            height: 28px;
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .history-info {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--light);
        }
        .history-info span {
            opacity: 0.7;
            margin-right: 4px;
        }
        .history-info strong {
            color: var(--primary);
        }
        .history-card .close-history {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--light);
            opacity: 0.5;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .history-card .close-history:hover {
            opacity: 1;
            background: rgba(255,255,255,0.1);
        }

        /* ===== 新增：随机推荐弹窗 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: var(--darker);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255,255,255,0.1);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal-overlay.show .modal-content {
            transform: scale(1);
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            font-size: 1.4rem;
            color: var(--light);
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.7;
            transition: var(--transition-fast);
        }
        .modal-close:hover {
            opacity: 1;
            transform: scale(1.1);
            color: var(--primary);
        }
        .modal-body {
            padding: 20px;
        }
        .random-player-wrapper {
            width: 100%;
            margin: 15px 0;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #000;
        }
        .random-player-wrapper .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .random-player-wrapper iframe,
        .random-player-wrapper .custom-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .modal-body .video-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary);
        }
        .goto-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .goto-btn:hover {
            background: #f40612;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <!-- 历史卡片（动态插入） -->
    <div id="historyCardContainer" style="padding: 0 20px; max-width: 1400px; margin: 0 auto;"></div>

    <header class="app-header">
        <div class="branding">
            <div class="logo">Y</div>
            <div class="brand-name">渊迂电视新闻网+</div>
        </div>
        <div class="nav-actions">
            <a href="login.html" class="nav-icon">
                <i class="fas fa-user"></i>
            </a>
        </div>
    </header>

    <div class="container">
        <div class="content-area" id="contentArea">
            <!-- 动态内容 + 加载指示器 -->
            <div class="loading-container" id="loadingContainer">
                <div class="loading"><div></div><div></div><div></div><div></div></div>
            </div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>首页</span>
        </a>
        <a href="knock.html" class="nav-item active">
            <i class="fas fa-play-circle"></i>
            <span>视频</span>
        </a>
        <a href="archive.html" class="nav-item">
            <i class="fas fa-bolt"></i>
            <span>历史</span>
        </a>
        <a href="tool.html" class="nav-item">
            <i class="fas fa-sync-alt"></i>
            <span>服务</span>
        </a>
    </nav>

    <!-- 随机推荐弹窗 -->
    <div class="modal-overlay" id="randomModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-random" style="margin-right: 10px;"></i>为您推荐以下视频</h3>
                <button class="modal-close" id="closeModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态填充视频信息 -->
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 全局变量 ----------
            let appData = null;                // 存储从json加载的数据
            const contentArea = document.getElementById('contentArea');
            const loadingContainer = document.getElementById('loadingContainer');
            const historyContainer = document.getElementById('historyCardContainer');
            const modalOverlay = document.getElementById('randomModal');
            const modalBody = document.getElementById('modalBody');
            const closeModalBtn = document.getElementById('closeModalBtn');

            // 关闭弹窗事件
            closeModalBtn.addEventListener('click', () => {
                modalOverlay.classList.remove('show');
                // 停止弹窗内视频播放（如果有自定义播放器）
                const iframes = modalBody.querySelectorAll('iframe');
                iframes.forEach(iframe => iframe.src = iframe.src); // 重新加载会停止播放
                const customVideo = modalBody.querySelector('video');
                if (customVideo) customVideo.pause();
            });
            // 点击遮罩关闭
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    closeModalBtn.click();
                }
            });

            // ---------- 辅助函数 ----------
            function showLoading() {
                if (loadingContainer) loadingContainer.style.display = 'flex';
            }
            function hideLoading() {
                if (loadingContainer) loadingContainer.style.display = 'none';
            }

            // 创建粒子背景
            function createParticles() {
                const particlesContainer = document.getElementById('particles');
                if (!particlesContainer) return;
                const particleCount = window.innerWidth < 768 ? 20 : 50;
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    const size = Math.random() * 10 + 5;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.left = `${Math.random() * 100}%`;
                    particle.style.bottom = `-${size}px`;
                    const duration = Math.random() * 20 + 10;
                    const delay = Math.random() * 10;
                    particle.style.animation = `float ${duration}s linear ${delay}s infinite`;
                    particle.style.opacity = Math.random() * 0.4 + 0.1;
                    particlesContainer.appendChild(particle);
                }
            }

            // 查找节目通过showId
            function findShowByShowId(showId) {
                for (let cat of appData.categories) {
                    const show = cat.shows.find(s => s.id === showId);
                    if (show) return { show, category: cat };
                }
                return null;
            }

            // 查找分集
            function findEpisode(showId, episodeId) {
                const found = findShowByShowId(showId);
                if (!found) return null;
                const episode = found.show.episodes.find(e => e.id === episodeId);
                return episode ? { episode, show: found.show, category: found.category } : null;
            }

            // 获取视频嵌入代码 (完整保留原逻辑)
            function getVideoEmbed(url, playerId = '') {
                if (url.includes('bilibili')) {
                    return `<iframe src="${url}" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>`;
                } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    let videoId = '';
                    if (url.includes('youtube.com')) {
                        videoId = url.split('v=')[1];
                        const ampersandPos = videoId.indexOf('&');
                        if (ampersandPos !== -1) videoId = videoId.substring(0, ampersandPos);
                    } else if (url.includes('youtu.be')) {
                        videoId = url.split('/').pop();
                    }
                    return `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                } else {
                    // 直链视频使用自定义播放器，注意ID不能重复，加随机后缀
                    const uniqueId = 'customPlayer_' + Math.random().toString(36).substr(2, 8);
                    return `
                        <div class="custom-player" id="${uniqueId}">
                            <video id="video_${uniqueId}" preload="metadata">
                                <source src="${url}" type="video/mp4">
                                您的浏览器不支持视频播放
                            </video>
                            <div class="player-overlay" id="overlay_${uniqueId}">
                                <i class="fas fa-play-circle overlay-play-btn" id="playBtn_${uniqueId}"></i>
                            </div>
                            <div class="loading-indicator" id="loading_${uniqueId}">
                                <div class="loading-spinner"></div>
                            </div>
                            <div class="player-controls">
                                <button id="playPause_${uniqueId}" class="control-btn play-pause-btn">
                                    <i class="fas fa-play" id="playIcon_${uniqueId}"></i>
                                </button>
                                <div class="time-display">
                                    <span id="current_${uniqueId}">0:00</span> / 
                                    <span id="duration_${uniqueId}">0:00</span>
                                </div>
                                <div class="progress-container" id="progress_${uniqueId}">
                                    <div class="progress-bar" id="progressBar_${uniqueId}"></div>
                                </div>
                                <div class="volume-control">
                                    <button id="mute_${uniqueId}" class="control-btn">
                                        <i class="fas fa-volume-up" id="volumeIcon_${uniqueId}"></i>
                                    </button>
                                    <input type="range" id="volumeSlider_${uniqueId}" class="volume-slider" min="0" max="1" step="0.1" value="1">
                                </div>
                                <div class="speed-menu">
                                    <button id="speedBtn_${uniqueId}" class="control-btn speed-btn">1.0x</button>
                                    <div class="speed-options" id="speedOptions_${uniqueId}">
                                        <button class="speed-option" data-speed="0.5">0.5x</button>
                                        <button class="speed-option" data-speed="0.75">0.75x</button>
                                        <button class="speed-option active" data-speed="1">1.0x</button>
                                        <button class="speed-option" data-speed="1.25">1.25x</button>
                                        <button class="speed-option" data-speed="1.5">1.5x</button>
                                        <button class="speed-option" data-speed="2">2.0x</button>
                                    </div>
                                </div>
                                <button id="fullscreen_${uniqueId}" class="control-btn fullscreen-btn">
                                    <i class="fas fa-expand"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }
            }

            // 初始化自定义播放器 (完整版，由于弹窗内也需要，我们写一个独立函数)
            function initCustomPlayer(playerElement) {
                if (!playerElement) return;
                const video = playerElement.querySelector('video');
                if (!video) return;
                const playerId = video.id.replace('video_', '');
                
                const playPauseBtn = document.getElementById('playPause_' + playerId);
                const playPauseIcon = document.getElementById('playIcon_' + playerId);
                const progressBar = document.getElementById('progressBar_' + playerId);
                const progressContainer = document.getElementById('progress_' + playerId);
                const currentTimeEl = document.getElementById('current_' + playerId);
                const durationEl = document.getElementById('duration_' + playerId);
                const muteBtn = document.getElementById('mute_' + playerId);
                const volumeIcon = document.getElementById('volumeIcon_' + playerId);
                const volumeSlider = document.getElementById('volumeSlider_' + playerId);
                const speedBtn = document.getElementById('speedBtn_' + playerId);
                const speedOptions = document.getElementById('speedOptions_' + playerId);
                const fullscreenBtn = document.getElementById('fullscreen_' + playerId);
                const playerOverlay = document.getElementById('overlay_' + playerId);
                const overlayPlayBtn = document.getElementById('playBtn_' + playerId);
                const loadingIndicator = document.getElementById('loading_' + playerId);

                let isPlaying = false;
                let isSeeking = false;
                let playbackRate = 1;

                video.addEventListener('loadedmetadata', () => {
                    durationEl.textContent = formatTime(video.duration);
                    video.volume = volumeSlider.value;
                });
                video.addEventListener('timeupdate', () => {
                    if (!isSeeking) {
                        const percent = (video.currentTime / video.duration) * 100;
                        progressBar.style.width = `${percent}%`;
                        currentTimeEl.textContent = formatTime(video.currentTime);
                    }
                });
                video.addEventListener('play', () => {
                    isPlaying = true;
                    playPauseIcon.classList.remove('fa-play');
                    playPauseIcon.classList.add('fa-pause');
                    if (playerOverlay) playerOverlay.classList.remove('visible');
                });
                video.addEventListener('pause', () => {
                    isPlaying = false;
                    playPauseIcon.classList.remove('fa-pause');
                    playPauseIcon.classList.add('fa-play');
                    if (playerOverlay) playerOverlay.classList.add('visible');
                });
                video.addEventListener('waiting', () => {
                    if (loadingIndicator) loadingIndicator.classList.add('visible');
                });
                video.addEventListener('playing', () => {
                    if (loadingIndicator) loadingIndicator.classList.remove('visible');
                });
                video.addEventListener('ended', () => {
                    isPlaying = false;
                    playPauseIcon.classList.remove('fa-pause');
                    playPauseIcon.classList.add('fa-play');
                    if (playerOverlay) playerOverlay.classList.add('visible');
                });

                function togglePlayPause() {
                    if (video.paused) video.play();
                    else video.pause();
                }

                if (playPauseBtn) playPauseBtn.addEventListener('click', togglePlayPause);
                if (playerOverlay) playerOverlay.addEventListener('click', togglePlayPause);
                if (overlayPlayBtn) overlayPlayBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlayPause(); });

                if (progressContainer) {
                    progressContainer.addEventListener('click', (e) => {
                        const rect = progressContainer.getBoundingClientRect();
                        const percent = (e.clientX - rect.left) / rect.width;
                        video.currentTime = percent * video.duration;
                    });
                    progressContainer.addEventListener('mousedown', () => isSeeking = true);
                    document.addEventListener('mouseup', () => isSeeking = false);
                    progressContainer.addEventListener('mousemove', (e) => {
                        if (isSeeking) {
                            const rect = progressContainer.getBoundingClientRect();
                            const percent = (e.clientX - rect.left) / rect.width;
                            progressBar.style.width = `${percent * 100}%`;
                            video.currentTime = percent * video.duration;
                        }
                    });
                }

                if (muteBtn) {
                    muteBtn.addEventListener('click', () => {
                        video.muted = !video.muted;
                        updateVolumeIcon();
                    });
                }
                if (volumeSlider) {
                    volumeSlider.addEventListener('input', () => {
                        video.volume = volumeSlider.value;
                        video.muted = false;
                        updateVolumeIcon();
                    });
                }
                function updateVolumeIcon() {
                    if (!volumeIcon) return;
                    if (video.muted || video.volume === 0) {
                        volumeIcon.classList.remove('fa-volume-up', 'fa-volume-down');
                        volumeIcon.classList.add('fa-volume-mute');
                        if (volumeSlider) volumeSlider.value = 0;
                    } else if (video.volume > 0.5) {
                        volumeIcon.classList.remove('fa-volume-mute', 'fa-volume-down');
                        volumeIcon.classList.add('fa-volume-up');
                    } else {
                        volumeIcon.classList.remove('fa-volume-mute', 'fa-volume-up');
                        volumeIcon.classList.add('fa-volume-down');
                    }
                }

                if (speedBtn && speedOptions) {
                    speedBtn.addEventListener('click', () => speedOptions.classList.toggle('show'));
                    document.querySelectorAll(`#speedOptions_${playerId} .speed-option`).forEach(opt => {
                        opt.addEventListener('click', () => {
                            const speed = parseFloat(opt.dataset.speed);
                            video.playbackRate = speed;
                            playbackRate = speed;
                            speedBtn.textContent = `${speed}x`;
                            document.querySelectorAll(`#speedOptions_${playerId} .speed-option`).forEach(o => o.classList.remove('active'));
                            opt.classList.add('active');
                            speedOptions.classList.remove('show');
                        });
                    });
                    document.addEventListener('click', (e) => {
                        if (!speedBtn.contains(e.target) && !speedOptions.contains(e.target)) {
                            speedOptions.classList.remove('show');
                        }
                    });
                }

                if (fullscreenBtn) {
                    fullscreenBtn.addEventListener('click', () => {
                        const player = playerElement.closest('.custom-player');
                        if (!player) return;
                        if (document.fullscreenElement) {
                            if (document.exitFullscreen) document.exitFullscreen();
                            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                            else if (document.msExitFullscreen) document.msExitFullscreen();
                        } else {
                            if (player.requestFullscreen) player.requestFullscreen();
                            else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
                            else if (player.msRequestFullscreen) player.msRequestFullscreen();
                        }
                    });
                }

                let controlsTimeout;
                function showControls() {
                    const player = playerElement.closest('.custom-player');
                    if (!player) return;
                    player.classList.add('controls-visible');
                    clearTimeout(controlsTimeout);
                    controlsTimeout = setTimeout(() => {
                        if (!isPlaying) return;
                        player.classList.remove('controls-visible');
                    }, 3000);
                }
                playerElement.addEventListener('mousemove', showControls);
                playerElement.addEventListener('click', showControls);
                showControls();

                function formatTime(seconds) {
                    if (!seconds) return '0:00';
                    const mins = Math.floor(seconds / 60);
                    const secs = Math.floor(seconds % 60);
                    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                }
            }

            // ---------- 浏览历史相关 ----------
            function saveLastWatched(showId, episodeId, title, thumbnail) {
                const history = {
                    showId,
                    episodeId,
                    title,
                    thumbnail,
                    timestamp: Date.now()
                };
                localStorage.setItem('lastWatched', JSON.stringify(history));
                displayHistoryCard();
            }

            function displayHistoryCard() {
                const historyJson = localStorage.getItem('lastWatched');
                if (!historyJson) {
                    historyContainer.innerHTML = '';
                    return;
                }
                try {
                    const history = JSON.parse(historyJson);
                    if (!history.showId || !history.episodeId) return;
                    const thumbUrl = history.thumbnail || '';
                    historyContainer.innerHTML = `
                        <div class="history-card" id="historyCard">
                            <div class="history-thumb" style="background-image: url('${thumbUrl}')"></div>
                            <div class="history-info">
                                <span>上次看到：</span><strong>${history.title}</strong>
                            </div>
                            <button class="close-history" id="closeHistoryBtn" title="移除"><i class="fas fa-times"></i></button>
                        </div>
                    `;
                    const card = document.getElementById('historyCard');
                    card.addEventListener('click', (e) => {
                        if (e.target.closest('#closeHistoryBtn')) return;
                        window.location.hash = `#/${history.showId}/${history.episodeId}`;
                    });
                    document.getElementById('closeHistoryBtn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        localStorage.removeItem('lastWatched');
                        displayHistoryCard();
                    });
                } catch (e) {
                    console.warn('历史记录解析失败');
                }
            }

            // ---------- 随机推荐弹窗 ----------
            function showRandomPopup() {
                if (!appData) return;
                // 收集所有episode
                const allEpisodes = [];
                appData.categories.forEach(cat => {
                    cat.shows.forEach(show => {
                        show.episodes.forEach(ep => {
                            allEpisodes.push({
                                showId: show.id,
                                episodeId: ep.id,
                                title: ep.title,
                                thumbnail: ep.thumbnail || show.image,
                                videoUrl: ep.videoUrl,
                                showTitle: show.title
                            });
                        });
                    });
                });
                if (allEpisodes.length === 0) return;
                const random = allEpisodes[Math.floor(Math.random() * allEpisodes.length)];
                // 填充模态框
                modalBody.innerHTML = `
                    <div class="video-title">${random.title} (来自《${random.showTitle}》)</div>
                    <div class="random-player-wrapper">
                        <div class="player-wrapper">
                            ${getVideoEmbed(random.videoUrl, 'random')}
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 20px;">
                        <button class="goto-btn" id="gotoRandomBtn"><i class="fas fa-play"></i> 前往观看</button>
                    </div>
                `;
                // 初始化自定义播放器（如果有）
                const customPlayer = modalBody.querySelector('.custom-player');
                if (customPlayer) {
                    initCustomPlayer(customPlayer);
                }
                // 绑定前往按钮
                document.getElementById('gotoRandomBtn').addEventListener('click', () => {
                    modalOverlay.classList.remove('show');
                    window.location.hash = `#/${random.showId}/${random.episodeId}`;
                });
                modalOverlay.classList.add('show');
            }

            // ---------- 路由处理 ----------
            function handleRoute() {
                if (!appData) return; // 数据未加载完成不处理

                let hash = window.location.hash.slice(1) || '/';
                if (hash === '') hash = '/';
                const parts = hash.split('/').filter(p => p.length > 0);

                // 首页
                if (hash === '/' || parts.length === 0) {
                    renderHomePage();
                    return;
                }

                // 一级: 分类 或 节目
                if (parts.length === 1) {
                    const id = parts[0];
                    const category = appData.categories.find(c => c.id === id);
                    if (category) {
                        renderCategoryPage(category.id);
                        return;
                    }
                    const found = findShowByShowId(id);
                    if (found) {
                        renderShowPage(found.category.id, found.show.id);
                        return;
                    }
                    renderNotFound();
                    return;
                }

                // 二级: #/showId/episodeId
                if (parts.length === 2) {
                    const [showId, episodeId] = parts;
                    const found = findEpisode(showId, episodeId);
                    if (found) {
                        renderPlayerPage(found.category.id, showId, episodeId);
                        return;
                    }
                    renderNotFound();
                    return;
                }

                renderNotFound();
            }

            // ---------- 页面渲染函数 (修改部分：随机按钮和保存历史) ----------
            function renderHomePage() {
                function getPopularShows() {
                    const all = [];
                    appData.categories.forEach(c => c.shows.forEach(s => {
                        all.push({ ...s, categoryId: c.id });
                    }));
                    return all.sort((a,b) => b.episodes.length - a.episodes.length).slice(0,10);
                }

                const popular = getPopularShows();
                contentArea.innerHTML = `
                    <div class="hero-banner">
                        <div class="hero-background"></div>
                        <div class="hero-content">
                            <h1 class="hero-title">欢迎来到YRTN+</h1>
                            <p class="hero-description">畅享海量高清视频，涵盖新闻、体育、娱乐等各类精彩内容。</p>
                            <div class="hero-actions">
                                <button class="btn btn-primary" id="randomPlayBtn"><i class="fas fa-random"></i>随机推荐</button>
                                <button class="btn btn-secondary"><i class="fas fa-info-circle"></i>即刻享受</button>
                            </div>
                        </div>
                    </div>
                    <div class="content-row">
                        <div class="row-header"><h2 class="row-title">热门分类</h2></div>
                        <div class="row-content" id="row1">
                            ${appData.categories.map(c => `
                                <div class="row-item" data-category-id="${c.id}">
                                    <div class="row-item-image" style="background-image: url('${c.image}')"></div>
                                    <div class="row-item-info">
                                        <div class="row-item-title">${c.name}</div>
                                        <div class="row-item-meta">${c.shows.length}个节目</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="content-row">
                        <div class="row-header"><h2 class="row-title">热门节目</h2></div>
                        <div class="row-content" id="row2">
                            ${popular.map(s => `
                                <div class="row-item" data-show-id="${s.id}">
                                    <div class="row-item-image" style="background-image: url('${s.image}')"></div>
                                    <div class="row-item-info">
                                        <div class="row-item-title">${s.title}</div>
                                        <div class="row-item-meta">${s.episodes.length}期节目</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <h2 class="section-title">所有分类</h2>
                    <div class="categories-grid">
                        ${appData.categories.map(c => `
                            <div class="category-card" data-category-id="${c.id}">
                                <div class="category-image" style="background-image: url('${c.image}')">
                                    <div class="category-overlay">
                                        <div class="category-name">${c.name}</div>
                                        <div class="category-count">${c.shows.length}个节目</div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;

                // 绑定点击事件更新hash
                document.querySelectorAll('[data-category-id]').forEach(el => {
                    el.addEventListener('click', () => {
                        window.location.hash = `#/${el.dataset.categoryId}`;
                    });
                });
                document.querySelectorAll('[data-show-id]').forEach(el => {
                    el.addEventListener('click', () => {
                        window.location.hash = `#/${el.dataset.showId}`;
                    });
                });
                // 随机播放按钮改为弹窗
                document.getElementById('randomPlayBtn')?.addEventListener('click', showRandomPopup);
            }

            function renderCategoryPage(categoryId) {
                const cat = appData.categories.find(c => c.id === categoryId);
                if (!cat) return renderNotFound();
                contentArea.innerHTML = `
                    <div class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i>返回首页</div>
                    <div class="hero-banner">
                        <div class="hero-background" style="background-image: url('${cat.image}')"></div>
                        <div class="hero-content">
                            <h1 class="hero-title">${cat.name}</h1>
                            <p class="hero-description">探索${cat.shows.length}个精彩节目</p>
                        </div>
                    </div>
                    <h2 class="section-title">所有节目</h2>
                    <div class="shows-grid">
                        ${cat.shows.map(show => `
                            <div class="show-card" data-show-id="${show.id}">
                                <div class="show-image" style="background-image: url('${show.image}')"></div>
                                <div class="show-info">
                                    <h3 class="show-title">${show.title}</h3>
                                    <p class="show-description">${show.description}</p>
                                    <div class="show-meta"><span>${show.episodes.length}期节目</span></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                document.getElementById('backBtn').addEventListener('click', ()=>{
                    window.location.hash = '#/';
                });
                document.querySelectorAll('[data-show-id]').forEach(el => {
                    el.addEventListener('click', ()=>{
                        window.location.hash = `#/${el.dataset.showId}`;
                    });
                });
            }

            function renderShowPage(categoryId, showId) {
                const found = findShowByShowId(showId);
                if (!found) return renderNotFound();
                const { show, category } = found;
                contentArea.innerHTML = `
                    <div class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i>返回${category.name}</div>
                    <div class="hero-banner">
                        <div class="hero-background" style="background-image: url('${show.image}')"></div>
                        <div class="hero-content">
                            <h1 class="hero-title">${show.title}</h1>
                            <p class="hero-description">${show.description}</p>
                        </div>
                    </div>
                    <h3 style="font-size:1.4rem; margin:20px 0; color:var(--light);">分集列表</h3>
                    <div class="episodes-grid">
                        ${show.episodes.map(ep => `
                            <div class="episode-card" data-episode-id="${ep.id}" data-show-id="${show.id}">
                                <div class="episode-thumb" style="background-image: url('${ep.thumbnail || show.image}')"></div>
                                <div class="episode-info">
                                    <div class="episode-title">${ep.title}</div>
                                    <div class="episode-date">${ep.date} · ${ep.views}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                document.getElementById('backBtn').addEventListener('click', ()=>{
                    window.location.hash = `#/${category.id}`;
                });
                document.querySelectorAll('.episode-card').forEach(card => {
                    card.addEventListener('click', ()=>{
                        const sid = card.dataset.showId;
                        const eid = card.dataset.episodeId;
                        window.location.hash = `#/${sid}/${eid}`;
                    });
                });
            }

            function renderPlayerPage(categoryId, showId, episodeId) {
                const found = findEpisode(showId, episodeId);
                if (!found) return renderNotFound();
                const { episode, show, category } = found;
                // 保存浏览历史
                saveLastWatched(showId, episodeId, episode.title, episode.thumbnail || show.image);

                contentArea.innerHTML = `
                    <div class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i>返回${show.title}</div>
                    <div class="player-container">
                        <div class="player-wrapper" id="playerWrapper">
                            ${getVideoEmbed(episode.videoUrl)}
                        </div>
                        <div class="player-info">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <h1 class="player-title">${episode.title}</h1>
                                <button class="share-btn" id="shareBtn" title="分享视频"><i class="fas fa-share-alt"></i></button>
                            </div>
                            <div class="player-meta">
                                <span>${episode.date}</span>
                                <span>${episode.duration} · ${episode.views}次播放</span>
                            </div>
                            <p class="player-description">${show.description}</p>
                        </div>
                    </div>
                    <div style="margin-top:40px;">
                        <h3 class="section-title">相关视频</h3>
                        <div class="shows-grid">
                            ${show.episodes.filter(e => e.id !== episodeId).slice(0,3).map(e => `
                                <div class="show-card" data-episode-id="${e.id}" data-show-id="${show.id}">
                                    <div class="show-image" style="background-image: url('${e.thumbnail || show.image}')"></div>
                                    <div class="show-info">
                                        <h3 class="show-title">${e.title}</h3>
                                        <div class="show-meta"><span>${e.duration}</span></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                document.getElementById('backBtn').addEventListener('click', ()=>{
                    window.location.hash = `#/${show.id}`;
                });
                document.querySelectorAll('[data-episode-id]').forEach(card => {
                    card.addEventListener('click', ()=>{
                        const sid = card.dataset.showId;
                        const eid = card.dataset.episodeId;
                        window.location.hash = `#/${sid}/${eid}`;
                    });
                });
                // 分享按钮
                document.getElementById('shareBtn')?.addEventListener('click', ()=>{
                    const url = window.location.href;
                    if (navigator.share) {
                        navigator.share({ title: episode.title, url: url });
                    } else {
                        navigator.clipboard.writeText(url).then(() => {
                            alert('链接已复制到剪贴板');
                        });
                    }
                });
                // 初始化自定义播放器
                if (!episode.videoUrl.includes('bilibili') && !episode.videoUrl.includes('youtube')) {
                    const customPlayer = document.querySelector('.custom-player');
                    if (customPlayer) initCustomPlayer(customPlayer);
                }
            }

            function renderNotFound() {
                contentArea.innerHTML = `<div style="text-align:center;padding:50px;"><h2>页面不存在</h2><button class="btn btn-primary" id="homeBtn">返回首页</button></div>`;
                document.getElementById('homeBtn')?.addEventListener('click', ()=> window.location.hash = '#/');
            }

            // ---------- 加载数据并启动 ----------
            async function loadAppData() {
                showLoading();
                try {
                    const response = await fetch('knockknock.json');
                    if (!response.ok) throw new Error('加载失败');
                    appData = await response.json();
                    hideLoading();
                    // 显示历史卡片
                    displayHistoryCard();
                    // 首次路由
                    handleRoute();
                    // 监听hash变化
                    window.addEventListener('hashchange', handleRoute);
                } catch (error) {
                    console.error('数据加载错误', error);
                    contentArea.innerHTML = `
                        <div style="text-align:center;padding:50px;">
                            <h2>数据加载失败</h2>
                            <p>请检查knockknock.json是否可访问</p>
                            <button class="btn btn-primary" id="retryBtn">重试</button>
                        </div>
                    `;
                    document.getElementById('retryBtn')?.addEventListener('click', loadAppData);
                } finally {
                    hideLoading();
                }
            }

            // 滚动隐藏头部
            let lastScroll = 0;
            window.addEventListener('scroll', ()=>{
                const current = window.pageYOffset;
                const header = document.querySelector('.app-header');
                const bottomNav = document.querySelector('.bottom-nav');
                if (current <= 0) {
                    header?.classList.remove('hidden');
                    bottomNav?.classList.remove('hidden');
                } else if (current > lastScroll && current > 100) {
                    header?.classList.add('hidden');
                    bottomNav?.classList.add('hidden');
                } else if (current < lastScroll) {
                    header?.classList.remove('hidden');
                    bottomNav?.classList.remove('hidden');
                }
                lastScroll = current;
            });

            // 启动
            createParticles();
            loadAppData();
        })();
    </script>
</body>
</html>
