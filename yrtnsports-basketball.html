<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>渊迂体育 · 渊华德篮球联赛</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      /* 红蓝闪电/喷漆风格 — 方角、硬朗、紧凑 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --red: #E11D1D;
    --blue: #0A3E8C;
    --red-bright: #FF3131;
    --blue-bright: #0047AB;
    --light-bg: #F2F2F2;
    --text-dark: #121212;
    --card-bg: #FFFFFF;
    --border-color: #CCCCCC;
    --shadow-hard: 8px 8px 0 rgba(0,0,0,0.15);
    --shadow-hard-hover: 4px 4px 0 rgba(225,29,29,0.5);
    --primary-gradient: linear-gradient(145deg, var(--red), var(--blue));
    /* 全明星青色渐变 */
    --allstar-grad: linear-gradient(135deg, #0f9b8e, #0b6e6f, #0a4c4c);
    --allstar-grad-light: linear-gradient(135deg, #c7f9f9, #b0e0e6);
}

body {
    font-family: 'Inter', sans-serif;
    background-color: #EAEAEA;
    background-image: 
        repeating-linear-gradient(45deg, rgba(225,29,29,0.03) 0px, rgba(225,29,29,0.03) 20px, 
                                  rgba(10,62,140,0.03) 20px, rgba(10,62,140,0.03) 40px);
    color: var(--text-dark);
    line-height: 1.4;
    padding-bottom: 100px;
    font-size: 14px;
}

body::after {
    content: "⚡⚡⚡";
    position: fixed;
    bottom: 30px;
    right: 20px;
    font-size: 4rem;
    opacity: 0.1;
    color: var(--red);
    transform: rotate(-10deg);
    pointer-events: none;
    z-index: -1;
    font-family: 'Bebas Neue', cursive;
    letter-spacing: 10px;
}

/* 顶部导航 */
.app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    border-bottom: 3px solid;
    border-image: var(--primary-gradient) 1;
    padding: 10px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow-hard);
}
.branding { display: flex; align-items: center; gap: 14px; }
.logo {
    width: 40px; height: 40px;
    background: var(--primary-gradient);
    border-radius: 0;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 800; font-size: 22px;
    box-shadow: 4px 4px 0 #000;
}
.brand-name {
    font-weight: 800; font-size: 1.5rem;
    background: var(--primary-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-transform: uppercase; font-family: 'Bebas Neue', cursive;
}
.nav-actions { display: flex; gap: 18px; }
.nav-icon { font-size: 1.3rem; color: var(--text-dark); opacity: 0.8; transition: 0.2s; }
.nav-icon:hover { color: var(--red); transform: translateY(-3px); text-shadow: 0 0 8px var(--red); }

/* 底部导航 */
.bottom-nav {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(20,20,20,0.95); backdrop-filter: blur(8px);
    border: 2px solid var(--red); border-radius: 0;
    padding: 10px 28px; display: flex; gap: 30px;
    box-shadow: 6px 6px 0 #000; z-index: 1000;
}
.nav-item {
    display: flex; flex-direction: column; align-items: center;
    color: #FFF; text-decoration: none; font-size: 0.7rem;
    font-weight: 600; transition: 0.2s; text-transform: uppercase;
}
.nav-item.active { color: var(--red-bright); text-shadow: 0 0 6px var(--red); }
.nav-item i { font-size: 1.3rem; margin-bottom: 2px; }
.nav-item:hover { color: var(--blue-bright); }
.basketball-icon {
    font-size: 2rem; color: white; margin-left: 5px;
    filter: drop-shadow(2px 2px 0 var(--red));
}
.basketball-icon:hover { color: var(--red-bright); transform: rotate(15deg); }

/* 主容器 */
.container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }

/* 头部标题 */
.league-header { display: flex; align-items: center; gap: 15px; margin: 20px 0 25px; }
.league-header i { font-size: 3rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.league-header h1 {
    font-size: 3rem; font-weight: 800; background: var(--primary-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-family: 'Bebas Neue', cursive; text-transform: uppercase;
}

/* 区域标题 */
.section-title {
    display: flex; align-items: center; gap: 8px; font-size: 1.4rem;
    font-weight: 700; margin: 40px 0 15px; color: var(--text-dark);
    border-left: 6px solid var(--red); padding-left: 12px;
    background: linear-gradient(to right, rgba(225,29,29,0.1), transparent);
    text-transform: uppercase;
}

/* 精彩视频推荐 (横向滚动) */
.featured-row {
    display: flex; gap: 15px; overflow-x: auto; padding: 10px 0 20px;
    scrollbar-width: thin; scrollbar-color: var(--red) #AAA;
    -webkit-overflow-scrolling: touch;
}
.featured-row::-webkit-scrollbar { height: 6px; }
.featured-row::-webkit-scrollbar-thumb { background: var(--primary-gradient); border-radius: 0; }
.featured-card {
    flex: 0 0 220px; background: var(--card-bg); border: 2px solid #000;
    border-radius: 0; overflow: hidden; box-shadow: var(--shadow-hard);
    transition: 0.2s; cursor: pointer;
}
.featured-card:hover {
    transform: translate(-4px, -4px);
    box-shadow: 12px 12px 0 rgba(225,29,29,0.3);
    border-color: var(--red);
}
.featured-thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; border-bottom: 2px solid #000; }
.featured-info { padding: 10px; }
.featured-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; color: var(--text-dark); }
.featured-meta { font-size: 0.7rem; color: #333; display: flex; gap: 5px; }

/* 球队横向滚动 */
.teams-row {
    display: flex; gap: 15px; overflow-x: auto; padding: 8px 0 20px;
    -webkit-overflow-scrolling: touch;
}
.team-card {
    flex: 0 0 120px; background: var(--card-bg); border: 2px solid #000;
    border-radius: 0; padding: 12px 6px; text-align: center; cursor: pointer;
    transition: 0.2s; box-shadow: var(--shadow-hard);
}
.team-card:hover {
    transform: translate(-3px, -3px);
    box-shadow: 8px 8px 0 var(--red);
    border-color: var(--red);
}
.team-logo {
    width: 56px; height: 56px; margin: 0 auto 8px;
    background: var(--primary-gradient); border-radius: 0;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 1.8rem; border: 2px solid #000;
    overflow: hidden;
}
.team-logo img {
    width: 100%; height: 100%; object-fit: cover;
}
.team-name { font-weight: 700; font-size: 0.85rem; margin-bottom: 4px; }
.team-coach { font-size: 0.65rem; color: #444; }

/* 时间轴赛程 — 可上下滚动 */
.timeline {
    max-height: 500px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-right: 5px;
    border: 2px solid #000;
    background: rgba(255,255,255,0.3);
    box-shadow: var(--shadow-hard);
    -webkit-overflow-scrolling: touch;
}
.timeline::-webkit-scrollbar {
    width: 8px;
}
.timeline::-webkit-scrollbar-track {
    background: #ccc;
}
.timeline::-webkit-scrollbar-thumb {
    background: var(--primary-gradient);
    border-radius: 0;
}

.timeline-item {
    background: var(--card-bg);
    border: 2px solid #000;
    border-radius: 0;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: 0.2s;
    margin: 0 5px 0 0;
    position: relative;
}
/* 季前赛样式 */
.timeline-item.pre-season {
    background: linear-gradient(135deg, #0a3e8c, #1e6ac5, #3b82f6);
    border: 2px solid #fff;
    box-shadow: 0 0 12px rgba(59,130,246,0.6);
    color: white;
}
.timeline-item.pre-season .timeline-date,
.timeline-item.pre-season .team-badge span,
.timeline-item.pre-season .timeline-score,
.timeline-item.pre-season .timeline-status {
    color: white;
    text-shadow: 0 0 4px rgba(0,0,0,0.5);
}
.timeline-item.pre-season .badge-logo {
    border-color: white;
    background: rgba(0,0,0,0.3);
}
/* 季中赛样式 */
.timeline-item.mid-season {
    background: linear-gradient(135deg, #e65c1e, #f59e0b);
    border: 2px solid #ffd966;
    box-shadow: 0 0 12px rgba(245,158,11,0.6);
    color: white;
}
.timeline-item.mid-season .timeline-date,
.timeline-item.mid-season .team-badge span,
.timeline-item.mid-season .timeline-score,
.timeline-item.mid-season .timeline-status {
    color: white;
    text-shadow: 0 0 4px rgba(0,0,0,0.5);
}
.timeline-item.mid-season .badge-logo {
    border-color: white;
    background: rgba(0,0,0,0.3);
}
/* 全明星赛样式 (炫彩) */
.timeline-item.all-star {
    background: linear-gradient(135deg, #f5af19, #f12711, #f5af19);
    background-size: 200% 200%;
    animation: starGlow 3s ease infinite;
    border: 2px solid #ffd966;
    box-shadow: 0 0 20px rgba(245,175,25,0.8);
    color: white;
}
.timeline-item.all-star .timeline-date,
.timeline-item.all-star .team-badge span,
.timeline-item.all-star .timeline-score,
.timeline-item.all-star .timeline-status {
    color: white;
    text-shadow: 0 0 4px rgba(0,0,0,0.5);
}
.timeline-item.all-star .badge-logo {
    border-color: white;
    background: rgba(0,0,0,0.3);
}
.timeline-item.all-star::after {
    content: "ALL-STAR";
    position: absolute;
    top: 50%;
    right: 20px;
    transform: translateY(-50%);
    font-size: 2rem;
    font-weight: 900;
    font-family: 'Bebas Neue', cursive;
    color: rgba(255,255,255,0.25);
    letter-spacing: 4px;
    pointer-events: none;
    white-space: nowrap;
}
@keyframes starGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.timeline-item:hover {
    transform: translate(-3px, -3px);
    box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
}

.timeline-date {
    font-weight: 600; color: var(--red); min-width: 70px;
    font-size: 0.8rem; text-transform: uppercase;
}
.timeline-teams { flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.team-badge { display: flex; align-items: center; gap: 6px; width: 120px; }
.team-badge.right { justify-content: flex-end; }
.badge-logo {
    width: 26px; height: 26px; background: var(--primary-gradient);
    border: 1px solid #000; display: flex; align-items: center;
    justify-content: center; color: white; font-size: 0.8rem;
    overflow: hidden;
}
.badge-logo img {
    width: 100%; height: 100%; object-fit: cover;
}
.team-badge span { font-weight: 600; font-size: 0.8rem; white-space: nowrap; }
.timeline-score {
    font-weight: 800; font-size: 1.1rem; background: var(--primary-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    min-width: 60px; text-align: center;
}
.pre-season .timeline-score, .mid-season .timeline-score, .all-star .timeline-score {
    background: none;
    -webkit-text-fill-color: white;
}
.timeline-status { font-size: 0.65rem; color: #555; min-width: 45px; text-align: right; }

/* 体育新闻轴 */
.news-timeline {
    max-height: 300px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-right: 5px;
    margin-bottom: 30px;
    border: 2px solid #000;
    background: rgba(255,255,255,0.3);
    box-shadow: var(--shadow-hard);
    -webkit-overflow-scrolling: touch;
}
.news-item {
    background: var(--card-bg); border-left: 6px solid var(--blue);
    border-bottom: 2px solid #000; border-right: 2px solid #000; border-top: 2px solid #000;
    padding: 10px 15px;
    display: flex;
    align-items: center;
    gap: 15px;
    transition: 0.2s;
    cursor: default;
}
.news-item:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 rgba(10,62,140,0.3);
}
.news-date {
    font-weight: 700; color: var(--blue); min-width: 65px;
    font-size: 0.8rem; text-transform: uppercase;
}
.news-headline {
    font-weight: 500; font-size: 0.9rem; color: var(--text-dark);
    line-height: 1.4;
}

/* 体育视频网格 */
.videos-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px; margin: 20px 0 40px;
}
.video-card {
    background: var(--card-bg); border: 2px solid #000; border-radius: 0;
    overflow: hidden; box-shadow: var(--shadow-hard); transition: 0.2s; cursor: pointer;
}
.video-card:hover {
    transform: translate(-3px, -3px);
    box-shadow: 8px 8px 0 var(--red);
    border-color: var(--red);
}
.video-thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; border-bottom: 2px solid #000; }
.video-info { padding: 10px; }
.video-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
.video-sub { display: flex; justify-content: space-between; font-size: 0.7rem; color: #444; }

/* 全屏模态层 (球队阵容/比赛数据) */
.fullscreen-modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(4px);
    z-index: 2000; overflow-y: auto; opacity: 0; visibility: hidden;
    transition: 0.2s; padding: 30px;
}
.fullscreen-modal.active { opacity: 1; visibility: visible; }
.modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; padding-bottom: 10px; border-bottom: 4px solid var(--red);
    flex-wrap: wrap;
}
.modal-header h2 {
    font-size: 2rem; font-weight: 800; color: white;
    text-transform: uppercase; font-family: 'Bebas Neue', cursive;
}
.close-modal {
    background: none; border: 3px solid white; color: white;
    font-size: 2rem; cursor: pointer; width: 50px; height: 50px;
    line-height: 50px; text-align: center; transition: 0.2s;
}
.close-modal:hover { background: var(--red); border-color: var(--red); }

/* 球队阵容全屏 */
.team-summary {
    background: rgba(255,255,255,0.1); border-left: 6px solid var(--red);
    padding: 15px 20px; margin-bottom: 25px; color: #eee;
}
.team-summary p { font-size: 0.9rem; margin-top: 8px; color: #ccc; }
.players-grid-full {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
}
.player-card-full {
    background: #FFF; border: 2px solid #000; border-radius: 0;
    padding: 12px; display: flex; align-items: center; gap: 10px;
    position: relative;
}
.player-card-full.starter { background: #FFF0F0; border-left-width: 6px; border-left-color: var(--red); }
.player-number-full {
    font-weight: 800; font-size: 1.3rem; color: var(--red);
    min-width: 40px; text-align: center;
}
.player-info-full { flex: 1; }
.player-name-full { font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.player-rating {
    background: var(--primary-gradient); color: white;
    font-weight: 800; font-size: 0.8rem; padding: 2px 6px;
    border: 1px solid #000; display: inline-block;
}
.player-meta-full {
    display: flex; gap: 12px; font-size: 0.75rem; color: #333;
    margin-top: 4px; flex-wrap: wrap;
}
.player-tags {
    display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap;
}
.player-tag {
    background: var(--blue); color: white;
    font-size: 0.65rem; font-weight: 600; padding: 2px 8px;
    border: 1px solid #000; text-transform: uppercase;
}
.starter-badge {
    background: var(--primary-gradient); color: white;
    padding: 2px 8px; font-size: 0.65rem; font-weight: 600;
    border: 1px solid #000;
}

/* 比赛数据全屏 (裁判、数据表) */
.referee-info {
    background: rgba(255,255,255,0.1); border-left: 6px solid var(--blue);
    padding: 12px 20px; margin-bottom: 25px; color: #ddd;
    font-size: 0.9rem;
}
.referee-info strong { color: white; margin-right: 10px; }
.stats-container { display: flex; flex-direction: column; gap: 25px; }
.team-stats {
    background: #FFF; border: 3px solid #000; border-radius: 0;
    padding: 20px; overflow-x: auto;
}
.team-stats h3 {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.4rem; margin-bottom: 15px; font-weight: 700;
}
.team-stats h3 img { width: 36px; height: 36px; border: 2px solid #000; object-fit: cover; }
.stats-table {
    width: 100%; border-collapse: collapse; font-size: 0.8rem;
    min-width: 800px;
}
.stats-table th {
    text-align: left; padding: 8px 6px; background: #000;
    color: white; font-weight: 600; white-space: nowrap;
}
.stats-table td {
    padding: 6px; border-bottom: 1px solid #ccc; white-space: nowrap;
}
.stats-table td:first-child { font-weight: 600; }

/* 文字直播区块 */
.live-text-section {
    background: #FFF; border: 3px solid #000; border-radius: 0;
    padding: 20px; margin-top: 10px;
}
.live-text-title {
    font-size: 1.4rem; font-weight: 700; margin-bottom: 15px;
    color: var(--red); display: flex; align-items: center; gap: 10px;
    border-left: 6px solid var(--red); padding-left: 12px;
}
.quarters-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 16px; margin-bottom: 20px;
}
.quarter-box {
    background: #F9F9F9; border: 2px solid #000; padding: 12px;
}
.quarter-header {
    font-weight: 800; font-size: 1.1rem; margin-bottom: 12px;
    color: var(--blue); border-bottom: 2px solid var(--blue);
    display: inline-block;
}
.event-list {
    list-style: none; padding: 0; margin: 0;
}
.event-item {
    font-size: 0.8rem; margin-bottom: 8px;
    border-left: 3px solid var(--red); padding-left: 8px;
}
.event-time {
    font-weight: 700; color: var(--red); margin-right: 6px;
}
.event-content {
    color: #333;
}
.no-event {
    color: #888; font-style: italic; font-size: 0.8rem;
}

.highlights-section {
    background: #FFF; border: 3px solid #000; border-radius: 0;
    padding: 20px; margin-top: 20px;
}
.highlights-title {
    font-size: 1.4rem; font-weight: 700; margin-bottom: 15px;
    color: var(--blue); display: flex; align-items: center; gap: 10px;
    border-left: 6px solid var(--blue); padding-left: 12px;
}
.highlights-content {
    font-size: 0.9rem; line-height: 1.5; color: #222;
    background: #F5F5F5; padding: 12px; border: 1px solid #ccc;
}

/* 全明星周末卡片网格 (青色主题) */
.allstar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    margin: 20px 0 30px;
}
.allstar-card {
    background: var(--card-bg);
    border: 2px solid #000;
    border-radius: 0;
    padding: 20px 12px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: var(--shadow-hard);
    background: linear-gradient(145deg, #ffffff, #e6f7f5);
}
.allstar-card:hover {
    transform: translate(-4px, -4px);
    box-shadow: 8px 8px 0 rgba(15,155,142,0.4);
    border-color: #0f9b8e;
    background: linear-gradient(145deg, #f0fffe, #ffffff);
}
.allstar-card i {
    font-size: 2.5rem;
    background: var(--allstar-grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
    display: inline-block;
}
.allstar-card h3 {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: #0b6e6f;
}
.allstar-card p {
    font-size: 0.8rem;
    color: #2c7a7a;
}

/* 全明星周末模态框 (青色主题) */
.allstar-modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 2001;
    overflow-y: auto;
    opacity: 0;
    visibility: hidden;
    transition: 0.2s;
    padding: 30px;
}
.allstar-modal.active {
    opacity: 1;
    visibility: visible;
}
.allstar-modal-content {
    background: linear-gradient(145deg, #ffffff, #e0f2f1);
    border: 3px solid #0f9b8e;
    border-radius: 0;
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px;
    position: relative;
    box-shadow: 20px 20px 0 rgba(15,155,142,0.3);
}
.allstar-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid #0f9b8e;
    padding-bottom: 15px;
    margin-bottom: 25px;
}
.allstar-modal-header h2 {
    font-size: 2rem;
    font-family: 'Bebas Neue', cursive;
    background: var(--allstar-grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
}
.allstar-close {
    background: none;
    border: 2px solid #0f9b8e;
    font-size: 1.8rem;
    cursor: pointer;
    width: 45px;
    height: 45px;
    line-height: 45px;
    text-align: center;
    color: #0f9b8e;
    transition: 0.2s;
}
.allstar-close:hover {
    background: #0f9b8e;
    color: white;
}
/* 全明星数据表格样式 (青色主题内嵌表格) */
.allstar-modal-content .stats-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    font-size: 0.85rem;
}
.allstar-modal-content .stats-table th,
.allstar-modal-content .stats-table td {
    border: 1px solid #0b6e6f;
    padding: 8px;
    text-align: left;
}
.allstar-modal-content .stats-table th {
    background: #0f9b8e;
    color: white;
}
.highlight-plays {
    background: #c7f9f9;
    padding: 12px;
    margin-top: 10px;
    font-style: italic;
}
.award-badge {
    background: var(--allstar-grad);
    display: inline-block;
    padding: 4px 12px;
    color: white;
    font-weight: bold;
    border-radius: 0;
    margin-bottom: 15px;
}

/* 加载动画 */
.loading-container { display: flex; justify-content: center; padding: 40px; }
.spinner {
    width: 40px; height: 40px; border: 4px solid #000;
    border-top-color: var(--red); animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.hidden { transform: translateY(-100%); }

/* 响应式适配 */
@media (max-width: 1024px) {
    .container { padding: 0 16px; }
    .section-title { font-size: 1.2rem; }
}

@media (max-width: 768px) {
    body { font-size: 13px; }
    .app-header { padding: 8px 16px; }
    .brand-name { font-size: 1.2rem; }
    .logo { width: 32px; height: 32px; font-size: 18px; }
    .league-header { margin: 15px 0 20px; gap: 10px; }
    .league-header i { font-size: 2.2rem; }
    .league-header h1 { font-size: 2rem; }
    .section-title { font-size: 1.1rem; margin: 30px 0 12px; }
    
    .featured-card { flex: 0 0 180px; }
    .team-card { flex: 0 0 100px; }
    .team-logo { width: 48px; height: 48px; font-size: 1.5rem; }
    .team-name { font-size: 0.75rem; }
    .team-coach { font-size: 0.6rem; }
    
    .timeline { max-height: 400px; }
    .timeline-item { padding: 10px 12px; gap: 8px; flex-wrap: wrap; }
    .timeline-date { min-width: 60px; font-size: 0.7rem; }
    .timeline-teams { width: 100%; order: 2; margin-top: 8px; }
    .timeline-score { font-size: 1rem; }
    .team-badge { width: 100px; }
    .timeline-status { order: 3; margin-left: auto; }
    
    .timeline-item.all-star::after {
        font-size: 1rem;
        right: 10px;
    }
    
    .news-item { padding: 8px 12px; gap: 10px; }
    .news-date { min-width: 55px; font-size: 0.7rem; }
    .news-headline { font-size: 0.8rem; }
    
    .videos-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .video-title { font-size: 0.8rem; }
    
    .fullscreen-modal { padding: 20px; }
    .modal-header h2 { font-size: 1.5rem; }
    .close-modal { width: 40px; height: 40px; font-size: 1.5rem; line-height: 40px; }
    
    .players-grid-full { grid-template-columns: 1fr; }
    .player-card-full { padding: 10px; }
    .player-number-full { font-size: 1.1rem; min-width: 35px; }
    .player-name-full { font-size: 0.9rem; }
    
    .quarters-grid { grid-template-columns: 1fr; gap: 12px; }
    .quarter-box { padding: 10px; }
    .quarter-header { font-size: 1rem; }
    .event-item { font-size: 0.75rem; }
    
    .bottom-nav { padding: 8px 20px; gap: 20px; }
    .nav-item span { display: none; }
    .nav-item i { font-size: 1.4rem; margin-bottom: 0; }
    .basketball-icon { font-size: 1.6rem; }
    
    .allstar-grid { grid-template-columns: repeat(2, 1fr); }
    .allstar-modal-content { padding: 20px; }
}

@media (max-width: 480px) {
    .container { padding: 0 12px; }
    .featured-card { flex: 0 0 160px; }
    .team-card { flex: 0 0 90px; padding: 8px 4px; }
    .team-logo { width: 42px; height: 42px; font-size: 1.3rem; }
    .team-name { font-size: 0.7rem; }
    
    .timeline-item { padding: 8px 10px; }
    .timeline-date { min-width: 50px; font-size: 0.65rem; }
    .timeline-score { font-size: 0.9rem; min-width: 50px; }
    .team-badge { width: 80px; gap: 4px; }
    .badge-logo { width: 22px; height: 22px; font-size: 0.7rem; }
    .team-badge span { font-size: 0.7rem; }
    
    .news-date { min-width: 48px; font-size: 0.65rem; }
    .news-headline { font-size: 0.75rem; }
    
    .videos-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .video-title { font-size: 0.75rem; }
    .video-sub { font-size: 0.65rem; }
    
    .live-text-title, .highlights-title { font-size: 1.2rem; }
    .referee-info { font-size: 0.8rem; padding: 8px 12px; }
    .team-stats h3 { font-size: 1.2rem; }
    .stats-table th, .stats-table td { font-size: 0.7rem; padding: 4px; }
    
    .allstar-grid { grid-template-columns: 1fr; }
}

/* 确保表格在小屏可横向滚动 */
.stats-container, .team-stats { overflow-x: auto; }
.stats-table { min-width: 600px; }
@media (max-width: 768px) {
    .stats-table { min-width: 500px; }
}
    </style>
</head>
<body>
    <header class="app-header">
        <div class="branding">
            <div class="logo">Y</div>
            <div class="brand-name">渊迂体育 · 篮球</div>
        </div>
        <div class="nav-actions">
            <a href="login.html" class="nav-icon"><i class="fas fa-user"></i></a>
        </div>
    </header>

    <div class="container">
        <div class="league-header">
            <i class="fas fa-bolt"></i>
            <h1>渊华德篮球联赛</h1>
        </div>

        <!-- 精彩视频推荐 -->
        <div class="section-title"><i class="fas fa-fire" style="color:var(--red);"></i> 精彩视频推荐</div>
        <div class="featured-row" id="featuredRow"></div>

        <!-- 全明星周末赛事卡片 (新增) -->
        <div class="section-title"><i class="fas fa-star" style="color:#0f9b8e;"></i> 全明星周末 · 渊华德2026</div>
        <div class="allstar-grid" id="allstarGrid">
            <!-- 动态生成六张卡片 -->
        </div>

        <!-- 球队阵容 -->
        <div class="section-title"><i class="fas fa-users" style="color:var(--blue);"></i> 球队阵容</div>
        <div class="teams-row" id="teamsRow"></div>

        <!-- 赛程时间轴 -->
        <div class="section-title"><i class="fas fa-calendar-alt" style="color:var(--red);"></i> 赛程时间轴</div>
        <div class="timeline" id="timelineContainer"></div>

        <!-- 体育新闻轴 -->
        <div class="section-title"><i class="fas fa-newspaper" style="color:var(--blue);"></i> 体育新闻 · 简讯</div>
        <div class="news-timeline" id="newsTimeline"></div>

        <!-- 体育视频系列 -->
        <div class="section-title"><i class="fas fa-play-circle" style="color:var(--blue);"></i> 更多体育视频</div>
        <div class="videos-grid" id="sportsVideosGrid"></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>首页</span></a>
        <a href="knock.html" class="nav-item"><i class="fas fa-play-circle"></i><span>视频</span></a>
        <a href="archive.html" class="nav-item"><i class="fas fa-bolt"></i><span>历史</span></a>
        <a href="tool.html" class="nav-item"><i class="fas fa-sync-alt"></i><span>服务</span></a>
        <i class="fas fa-basketball-ball basketball-icon"></i>
    </nav>

    <!-- 全屏模态: 球队阵容 -->
    <div class="fullscreen-modal" id="teamModal">
        <div class="modal-header">
            <h2 id="modalTeamName">球队阵容</h2>
            <button class="close-modal" id="closeTeamModal"><i class="fas fa-times"></i></button>
        </div>
        <div id="teamSummaryContainer" class="team-summary" style="display: none;">
            <p><strong>教练</strong> <span id="teamCoach"></span></p>
            <p id="teamDescription"></p>
        </div>
        <div class="players-grid-full" id="modalPlayersGrid"></div>
    </div>

    <!-- 全屏模态: 比赛数据 (原有) -->
    <div class="fullscreen-modal" id="gameModal">
        <div class="modal-header">
            <h2 id="modalGameTitle">比赛数据</h2>
            <button class="close-modal" id="closeGameModal"><i class="fas fa-times"></i></button>
        </div>
        <div id="refereeInfo" class="referee-info" style="display: none;"></div>
        <div class="stats-container" id="modalGameStats"></div>
        <div id="liveTextSection" class="live-text-section" style="display: none;"></div>
        <div id="highlightsSection" class="highlights-section" style="display: none;"></div>
    </div>

    <!-- 全明星周末模态框 (动态内容) -->
    <div class="allstar-modal" id="allstarModal">
        <div class="allstar-modal-content">
            <div class="allstar-modal-header">
                <h2 id="allstarModalTitle">全明星赛事</h2>
                <button class="allstar-close" id="closeAllstarModal"><i class="fas fa-times"></i></button>
            </div>
            <div id="allstarModalBody"></div>
        </div>
    </div>

    <script>
        (function() {
            // 数据存储
            let knockData = null;
            let teamsData = [];
            let scheduleData = [];
            let newsData = [];
            let allstarData = null;      // 全明星数据

            // DOM 元素
            const featuredRow = document.getElementById('featuredRow');
            const teamsRow = document.getElementById('teamsRow');
            const timelineContainer = document.getElementById('timelineContainer');
            const newsTimeline = document.getElementById('newsTimeline');
            const sportsVideosGrid = document.getElementById('sportsVideosGrid');
            const allstarGrid = document.getElementById('allstarGrid');

            const teamModal = document.getElementById('teamModal');
            const gameModal = document.getElementById('gameModal');
            const modalTeamName = document.getElementById('modalTeamName');
            const modalPlayersGrid = document.getElementById('modalPlayersGrid');
            const modalGameTitle = document.getElementById('modalGameTitle');
            const modalGameStats = document.getElementById('modalGameStats');
            const closeTeamModal = document.getElementById('closeTeamModal');
            const closeGameModal = document.getElementById('closeGameModal');
            const teamSummaryContainer = document.getElementById('teamSummaryContainer');
            const teamCoachSpan = document.getElementById('teamCoach');
            const teamDescriptionP = document.getElementById('teamDescription');
            const refereeInfoDiv = document.getElementById('refereeInfo');
            const liveTextSection = document.getElementById('liveTextSection');
            const highlightsSection = document.getElementById('highlightsSection');

            // 全明星模态框
            const allstarModal = document.getElementById('allstarModal');
            const allstarModalTitle = document.getElementById('allstarModalTitle');
            const allstarModalBody = document.getElementById('allstarModalBody');
            const closeAllstarModal = document.getElementById('closeAllstarModal');

            closeTeamModal.addEventListener('click', () => teamModal.classList.remove('active'));
            closeGameModal.addEventListener('click', () => gameModal.classList.remove('active'));
            closeAllstarModal.addEventListener('click', () => allstarModal.classList.remove('active'));
            window.addEventListener('click', e => {
                if (e.target === teamModal) teamModal.classList.remove('active');
                if (e.target === gameModal) gameModal.classList.remove('active');
                if (e.target === allstarModal) allstarModal.classList.remove('active');
            });

            // ---------- 加载数据 ----------
            async function loadKnock() {
                try {
                    const res = await fetch('knockknock.json');
                    if (!res.ok) throw new Error();
                    knockData = await res.json();
                } catch (e) { console.warn('knockknock.json 加载失败'); }
            }
            async function loadTeams() {
                try {
                    const res = await fetch('yhdleague-basketball.json');
                    if (!res.ok) throw new Error();
                    teamsData = await res.json();
                } catch (e) { console.warn('yhdleague-basketball.json 加载失败'); }
            }
            async function loadSchedule() {
                try {
                    const res = await fetch('basketballschedule2026.json');
                    if (!res.ok) throw new Error();
                    scheduleData = await res.json();
                } catch (e) { console.warn('basketballschedule2026.json 加载失败'); }
            }
            async function loadNews() {
                try {
                    const res = await fetch('yhdsports-news.json');
                    if (!res.ok) throw new Error();
                    newsData = await res.json();
                } catch (e) { console.warn('yhdsports-news.json 加载失败'); }
            }
            async function loadAllstar() {
                try {
                    const res = await fetch('yhdallstar2026.json');
                    if (!res.ok) throw new Error();
                    allstarData = await res.json();
                } catch (e) { console.warn('yhdallstar2026.json 加载失败'); }
            }

            // ---------- 精彩视频推荐 (保持不变) ----------
            function renderFeatured() {
                if (!knockData) { featuredRow.innerHTML = '<div style="padding:20px;">⚡ 暂无体育视频数据</div>'; return; }
                const sportCategory = knockData.categories.find(c => c.id === 'sport');
                if (!sportCategory) { featuredRow.innerHTML = '<div style="padding:20px;">未找到体育分类</div>'; return; }
                const allEpisodes = [];
                sportCategory.shows.forEach(show => {
                    show.episodes.forEach(ep => {
                        allEpisodes.push({
                            showId: show.id, episodeId: ep.id, title: ep.title,
                            thumbnail: ep.thumbnail || show.image, showTitle: show.title, duration: ep.duration
                        });
                    });
                });
                const shuffled = allEpisodes.sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, 6);
                let html = '';
                selected.forEach(item => {
                    html += `<div class="featured-card" data-show="${item.showId}" data-episode="${item.episodeId}">
                        <div class="featured-thumb" style="background-image: url('${item.thumbnail}')"></div>
                        <div class="featured-info">
                            <div class="featured-title">${item.title}</div>
                            <div class="featured-meta"><i class="far fa-clock"></i> ${item.duration || '--'} · ${item.showTitle}</div>
                        </div>
                    </div>`;
                });
                featuredRow.innerHTML = html;
                document.querySelectorAll('.featured-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const showId = card.dataset.show, epId = card.dataset.episode;
                        window.location.href = `knock.html#/sport/${showId}/${epId}`;
                    });
                });
            }

            // ---------- 球队阵容渲染 (保持不变) ----------
            function renderTeams() {
                if (!teamsData.length) { teamsRow.innerHTML = '<div style="padding:20px;">⚡ 暂无球队数据</div>'; return; }
                let html = '';
                teamsData.forEach(team => {
                    html += `<div class="team-card" data-team-id="${team.id}">
                        <div class="team-logo">${team.logo ? `<img src="${team.logo}" alt="${team.name}">` : '<i class="fas fa-basketball-ball"></i>'}</div>
                        <div class="team-name">${team.name}</div>
                        <div class="team-coach">${team.coach || '—'}</div>
                    </div>`;
                });
                teamsRow.innerHTML = html;
                document.querySelectorAll('.team-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const tid = card.dataset.teamId;
                        const team = teamsData.find(t => t.id == tid);
                        if (team) showTeamFullscreen(team);
                    });
                });
            }

            function showTeamFullscreen(team) {
                modalTeamName.innerText = `${team.name} · 球员名单`;
                if (team.coach || team.description) {
                    teamSummaryContainer.style.display = 'block';
                    teamCoachSpan.innerText = team.coach || '未知';
                    teamDescriptionP.innerText = team.description || '暂无球队简介';
                } else teamSummaryContainer.style.display = 'none';
                let playersHtml = '';
                if (team.players && team.players.length) {
                    team.players.forEach(p => {
                        const overall = p.overall ? `<span class="player-rating">${p.overall}</span>` : '';
                        const tags = (p.tags && p.tags.length) ? p.tags.slice(0,2).map(t => `<span class="player-tag">${t}</span>`).join('') : '';
                        playersHtml += `<div class="player-card-full ${p.starter ? 'starter' : ''}">
                            <div class="player-number-full">#${p.number || '—'}</div>
                            <div class="player-info-full">
                                <div class="player-name-full">${p.name} ${overall}</div>
                                <div class="player-meta-full"><span>${p.position || '锋卫'}</span>${p.starter ? '<span class="starter-badge">首发</span>' : ''}</div>
                                ${tags ? `<div class="player-tags">${tags}</div>` : ''}
                            </div>
                        </div>`;
                    });
                } else playersHtml = '<p style="color:white;">暂无球员数据</p>';
                modalPlayersGrid.innerHTML = playersHtml;
                teamModal.classList.add('active');
            }

            // ---------- 赛程渲染 (新到旧排序 + 分类标注，包含全明星识别) ----------
            function renderTimeline() {
                if (!scheduleData.length) {
                    timelineContainer.innerHTML = '<div style="padding:20px;">⚡ 暂无赛程数据</div>';
                    return;
                }
                // 排序：有效日期降序，无效日期放最后
                const withValidDate = scheduleData.filter(game => {
                    const date = new Date(game.date);
                    return !isNaN(date.getTime()) && game.date;
                });
                const withInvalidDate = scheduleData.filter(game => {
                    const date = new Date(game.date);
                    return isNaN(date.getTime()) || !game.date;
                });
                withValidDate.sort((a, b) => new Date(b.date) - new Date(a.date));
                const sortedSchedule = [...withValidDate, ...withInvalidDate];

                let html = '';
                sortedSchedule.forEach(game => {
                    const homeTeam = teamsData.find(t => t.id == game.homeTeamId);
                    const awayTeam = teamsData.find(t => t.id == game.awayTeamId);
                    const homeName = homeTeam ? homeTeam.name : '主队';
                    const awayName = awayTeam ? awayTeam.name : '客队';
                    const homeLogo = homeTeam?.logo ? `<img src="${homeTeam.logo}">` : '<i class="fas fa-basketball-ball"></i>';
                    const awayLogo = awayTeam?.logo ? `<img src="${awayTeam.logo}">` : '<i class="fas fa-basketball-ball"></i>';
                    
                    let gameTypeClass = '';
                    const idLower = (game.id || '').toLowerCase();
                    if (idLower.startsWith('allstar')) {
                        gameTypeClass = 'all-star';
                    } else if (idLower.startsWith('g')) {
                        gameTypeClass = 'pre-season';
                    } else if (idLower.startsWith('rs')) {
                        gameTypeClass = 'mid-season';
                    }
                    
                    html += `
                        <div class="timeline-item ${gameTypeClass}" data-game-id="${game.id}">
                            <div class="timeline-date">${game.date || '日期待定'}</div>
                            <div class="timeline-teams">
                                <div class="team-badge"><div class="badge-logo">${homeLogo}</div><span>${homeName}</span></div>
                                <div class="timeline-score">${game.homeScore ?? '?'} - ${game.awayScore ?? '?'}</div>
                                <div class="team-badge right"><span>${awayName}</span><div class="badge-logo">${awayLogo}</div></div>
                            </div>
                            <div class="timeline-status">${game.status || '已结束'}</div>
                        </div>
                    `;
                });
                timelineContainer.innerHTML = html;
                document.querySelectorAll('.timeline-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const gid = item.dataset.gameId;
                        const game = scheduleData.find(g => g.id == gid);
                        if (game) showGameFullscreen(game);
                    });
                });
            }

            // 比赛数据全屏 (原有，省略细节，保持功能)
            function showGameFullscreen(game) {
                const homeTeam = teamsData.find(t => t.id == game.homeTeamId);
                const awayTeam = teamsData.find(t => t.id == game.awayTeamId);
                const homeName = homeTeam ? homeTeam.name : '主队';
                const awayName = awayTeam ? awayTeam.name : '客队';
                modalGameTitle.innerText = `${homeName} vs ${awayName} · 球员数据`;

                if (game.referees) {
                    let refHtml = '';
                    if (typeof game.referees === 'object') {
                        const main = game.referees.main || '';
                        const lines = game.referees.linesman ? game.referees.linesman.join('、') : '';
                        refHtml = `<strong>主裁</strong> ${main}  <strong>边裁</strong> ${lines}`;
                    } else refHtml = `<strong>裁判</strong> ${game.referees}`;
                    refereeInfoDiv.innerHTML = refHtml;
                    refereeInfoDiv.style.display = 'block';
                } else refereeInfoDiv.style.display = 'none';

                let statsHtml = '';
                if (homeTeam) {
                    statsHtml += `<div class="team-stats"><h3><img src="${homeTeam.logo || ''}"> ${homeName}</h3><table class="stats-table">`;
                    statsHtml += `<tr><th>球员</th><th>号码</th><th>得分</th><th>篮板</th><th>助攻</th><th>正负值</th><th>失误</th><th>犯规</th><th>时间</th></tr>`;
                    const homeStats = game.playerStats?.filter(s => s.teamId == game.homeTeamId) || [];
                    homeStats.forEach(stat => {
                        const player = homeTeam.players?.find(p => p.id == stat.playerId);
                        const playerName = player ? player.name : '球员';
                        const number = player?.number || '—';
                        statsHtml += `<tr><td>${playerName}</td><td>${number}</td><td>${stat.points ?? '-'}</td><td>${stat.rebounds ?? '-'}</td><td>${stat.assists ?? '-'}</td><td>${stat.plusMinus ?? '-'}</td><td>${stat.turnovers ?? '-'}</td><td>${stat.fouls ?? '-'}</td><td>${stat.minutesPlayed ?? '-'}</td></tr>`;
                    });
                    statsHtml += `</table></div>`;
                }
                if (awayTeam) {
                    statsHtml += `<div class="team-stats"><h3><img src="${awayTeam.logo || ''}"> ${awayName}</h3><table class="stats-table">`;
                    statsHtml += `<tr><th>球员</th><th>号码</th><th>得分</th><th>篮板</th><th>助攻</th><th>正负值</th><th>失误</th><th>犯规</th><th>时间</th></tr>`;
                    const awayStats = game.playerStats?.filter(s => s.teamId == game.awayTeamId) || [];
                    awayStats.forEach(stat => {
                        const player = awayTeam.players?.find(p => p.id == stat.playerId);
                        const playerName = player ? player.name : '球员';
                        const number = player?.number || '—';
                        statsHtml += `<td><td>${playerName}</td><td>${number}</td><td>${stat.points ?? '-'}</td><td>${stat.rebounds ?? '-'}</td><td>${stat.assists ?? '-'}</td><td>${stat.plusMinus ?? '-'}</td><td>${stat.turnovers ?? '-'}</td><td>${stat.fouls ?? '-'}</td><td>${stat.minutesPlayed ?? '-'}</td></tr>`;
                    });
                    statsHtml += `</table></div>`;
                }
                modalGameStats.innerHTML = statsHtml || '<p style="color:white;">暂无详细数据</p>';

                // 文字直播
                if (game.liveText) {
                    const quarters = ['Q1', 'Q2', 'Q3', 'Q4'];
                    let liveHtml = `<div class="live-text-title"><i class="fas fa-comment-dots"></i> 文字直播</div><div class="quarters-grid">`;
                    quarters.forEach(q => {
                        const events = game.liveText[q] || [];
                        liveHtml += `<div class="quarter-box"><div class="quarter-header">${q}</div><ul class="event-list">`;
                        if (events.length === 0) liveHtml += `<li class="no-event">暂无事件</li>`;
                        else {
                            events.forEach(ev => {
                                liveHtml += `<li class="event-item"><span class="event-time">${ev.time}</span> <span class="event-content">${ev.content}</span></li>`;
                            });
                        }
                        liveHtml += `</ul></div>`;
                    });
                    liveHtml += `</div>`;
                    liveTextSection.innerHTML = liveHtml;
                    liveTextSection.style.display = 'block';
                } else liveTextSection.style.display = 'none';

                if (game.highlights && game.highlights.trim()) {
                    highlightsSection.innerHTML = `<div class="highlights-title"><i class="fas fa-star"></i> 精彩表现</div><div class="highlights-content">${game.highlights}</div>`;
                    highlightsSection.style.display = 'block';
                } else highlightsSection.style.display = 'none';

                gameModal.classList.add('active');
            }

            // ---------- 体育新闻渲染 ----------
            function renderNews() {
                if (!newsData || !newsData.news || !newsData.news.length) {
                    newsTimeline.innerHTML = '<div style="padding:20px;">⚡ 暂无体育新闻</div>';
                    return;
                }
                let html = '';
                newsData.news.forEach(item => {
                    html += `<div class="news-item"><div class="news-date">${item.date || ''}</div><div class="news-headline">${item.headline || item.content || '简讯'}</div></div>`;
                });
                newsTimeline.innerHTML = html;
            }

            // ---------- 体育视频网格 ----------
            function renderSportsVideos() {
                if (!knockData) { sportsVideosGrid.innerHTML = '<div style="padding:20px;">⚡ 请确保knockknock.json存在</div>'; return; }
                const sportCat = knockData.categories.find(c => c.id === 'sport');
                if (!sportCat) { sportsVideosGrid.innerHTML = '<div style="padding:20px;">未找到体育分类</div>'; return; }
                const allEpisodes = [];
                sportCat.shows.forEach(show => {
                    show.episodes.forEach(ep => {
                        allEpisodes.push({
                            showId: show.id, episodeId: ep.id, title: ep.title,
                            thumbnail: ep.thumbnail || show.image, views: ep.views, date: ep.date
                        });
                    });
                });
                if (allEpisodes.length === 0) { sportsVideosGrid.innerHTML = '<div style="padding:20px;">暂无体育视频</div>'; return; }
                let html = '';
                allEpisodes.forEach(ep => {
                    html += `<div class="video-card" data-show="${ep.showId}" data-episode="${ep.episodeId}">
                        <div class="video-thumb" style="background-image: url('${ep.thumbnail}')"></div>
                        <div class="video-info">
                            <div class="video-title">${ep.title}</div>
                            <div class="video-sub"><span><i class="far fa-eye"></i> ${ep.views}</span><span><i class="far fa-calendar"></i> ${ep.date}</span></div>
                        </div>
                    </div>`;
                });
                sportsVideosGrid.innerHTML = html;
                document.querySelectorAll('.video-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const showId = card.dataset.show, epId = card.dataset.episode;
                        window.location.href = `knock.html#/sport/${showId}/${epId}`;
                    });
                });
            }

            // ---------- 全明星周末卡片渲染 & 模态框内容 ----------
            function renderAllstarCards() {
                if (!allstarData) {
                    allstarGrid.innerHTML = '<div style="padding:20px;">⚡ 全明星数据加载中...</div>';
                    return;
                }
                const events = [
                    { key: 'celebrity', name: '名人赛', icon: 'fas fa-star', desc: '明星球员与各界名人同场竞技' },
                    { key: 'risingStars', name: '新秀挑战赛', icon: 'fas fa-bolt', desc: '未来之星闪耀登场' },
                    { key: 'threePoint', name: '三分球大赛', icon: 'fas fa-basketball-ball', desc: '神射手巅峰对决' },
                    { key: 'slamDunk', name: '扣篮大赛', icon: 'fas fa-flying', desc: '创意与力量碰撞' },
                    { key: 'skills', name: '技巧挑战赛', icon: 'fas fa-arrows-alt', desc: '全能技巧比拼' },
                    { key: 'allStarGame', name: '全明星正赛', icon: 'fas fa-trophy', desc: '东西部巨星对抗' }
                ];
                let html = '';
                events.forEach(ev => {
                    html += `<div class="allstar-card" data-event="${ev.key}">
                        <i class="${ev.icon}"></i>
                        <h3>${ev.name}</h3>
                        <p>${ev.desc}</p>
                    </div>`;
                });
                allstarGrid.innerHTML = html;
                document.querySelectorAll('.allstar-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const event = card.dataset.event;
                        showAllstarModal(event);
                    });
                });
            }

            function showAllstarModal(eventType) {
                if (!allstarData) return;
                allstarModal.classList.add('active');
                switch(eventType) {
                    case 'celebrity':
                        allstarModalTitle.innerText = '🏆 名人赛';
                        allstarModalBody.innerHTML = `<div class="award-badge">MVP: ${allstarData.awards?.find(a => a.award === 'Celebrity Game MVP')?.winner || '待定'}</div>
                        <p><strong>日期：</strong>${allstarData.date || '2026-04-10'}</p>
                        <p>${allstarData.highlights?.find(h => h.includes('名人赛')) || '精彩回顾：华兴市长吴鸣轩命中半场超远三分，引爆全场。'}</p>`;
                        break;
                    case 'risingStars':
                        allstarModalTitle.innerText = '🌟 新秀挑战赛';
                        allstarModalBody.innerHTML = `<div class="award-badge">MVP: ${allstarData.awards?.find(a => a.award === 'Rising Stars Challenge MVP')?.winner || 'Zeke Morrow'}</div>
                        <p>${allstarData.highlights?.find(h => h.includes('新秀赛')) || 'Zeke Morrow率队逆转，并在最后时刻命中绝杀跳投。'}</p>`;
                        break;
                    case 'threePoint':
                        allstarModalTitle.innerText = '🎯 三分球大赛';
                        const threeData = allstarData.threePointContest;
                        let threeHtml = `<div class="award-badge">冠军: ${threeData.champion} (${threeData.championScore}分)</div>`;
                        threeHtml += `<h3>参赛选手</h3><ul>`;
                        threeData.contestants.forEach(c => {
                            threeHtml += `<li>${c.name} (${c.teamId})</li>`;
                        });
                        threeHtml += `</ul><h3>轮次详情</h3>`;
                        threeData.rounds.forEach(round => {
                            threeHtml += `<p><strong>第${round.roundNumber}轮</strong></p><ul>`;
                            round.scores.forEach(s => {
                                const player = threeData.contestants.find(p => p.playerId === s.playerId);
                                threeHtml += `<li>${player?.name || s.playerId}: ${s.score}分</li>`;
                            });
                            threeHtml += `</ul>`;
                        });
                        allstarModalBody.innerHTML = threeHtml;
                        break;
                    case 'slamDunk':
                        allstarModalTitle.innerText = '✈️ 扣篮大赛';
                        const dunkData = allstarData.slamDunkContest;
                        let dunkHtml = `<div class="award-badge">扣篮王: ${dunkData.champion}</div>`;
                        dunkHtml += `<h3>参赛选手</h3><ul>`;
                        dunkData.contestants.forEach(c => {
                            dunkHtml += `<li>${c.name} (${c.teamId})</li>`;
                        });
                        dunkHtml += `</ul><h3>扣篮表现</h3>`;
                        dunkData.dunks.forEach(d => {
                            const player = dunkData.contestants.find(p => p.playerId === d.playerId);
                            dunkHtml += `<p><strong>${player?.name || d.playerId}</strong> - 第${d.dunkNumber}扣: 总分${d.totalScore} (${d.scores.join(',')})</p>`;
                            dunkHtml += `<p><em>“${d.description}”</em></p>`;
                        });
                        allstarModalBody.innerHTML = dunkHtml;
                        break;
                    case 'skills':
                        allstarModalTitle.innerText = '⚡ 技巧挑战赛';
                        const skillsData = allstarData.skillsChallenge;
                        let skillsHtml = `<div class="award-badge">冠军: ${skillsData.champion}</div>`;
                        skillsHtml += `<h3>对阵结果</h3><ul>`;
                        skillsData.bracket.forEach(m => {
                            skillsHtml += `<li>${m.player1} vs ${m.player2} → 胜者: ${m.winner} (${m.time})</li>`;
                        });
                        skillsHtml += `</ul>`;
                        allstarModalBody.innerHTML = skillsHtml;
                        break;
                    case 'allStarGame':
                        allstarModalTitle.innerText = '🏀 全明星正赛';
                        const gameData = allstarData.allStarGame;
                        const mvp = allstarData.awards?.find(a => a.award === 'All-Star Game MVP')?.winner || gameData.mvp;
                        let gameHtml = `<div class="award-badge">MVP: ${mvp}</div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                            <div><strong>${gameData.teamA.name}</strong> ${gameData.finalScore.teamAScore} : ${gameData.finalScore.teamBScore} <strong>${gameData.teamB.name}</strong></div>
                        </div>
                        <h3>单节比分</h3>
                        <p>${gameData.quarters.join(' | ')}</p>
                        <h3>球员数据</h3>
                        <table class="stats-table">`;
                        gameData.playerStats.forEach(p => {
                            const playerInfo = allstarData.allStarPlayers?.find(ap => ap.playerId === p.playerId);
                            const name = playerInfo?.name || p.playerId;
                            gameHtml += `<tr><td>${name}</td><td>${p.points}分</td><td>${p.rebounds}板</td><td>${p.assists}助</td><td>${p.steals}断</td><td>${p.blocks}帽</td></tr>`;
                        });
                        gameHtml += `</table><h3>高光时刻</h3><ul>`;
                        gameData.playerStats.forEach(p => {
                            if (p.highlightPlays) {
                                p.highlightPlays.forEach(play => {
                                    gameHtml += `<li>${play}</li>`;
                                });
                            }
                        });
                        gameHtml += `</ul>`;
                        allstarModalBody.innerHTML = gameHtml;
                        break;
                    default:
                        allstarModalBody.innerHTML = '<p>敬请期待</p>';
                }
            }

            // ---------- 初始化 ----------
            async function init() {
                featuredRow.innerHTML = '<div class="loading-container"><div class="spinner"></div></div>';
                teamsRow.innerHTML = '<div class="loading-container"><div class="spinner"></div></div>';
                timelineContainer.innerHTML = '<div class="loading-container"><div class="spinner"></div></div>';
                newsTimeline.innerHTML = '<div class="loading-container"><div class="spinner"></div></div>';
                sportsVideosGrid.innerHTML = '<div class="loading-container"><div class="spinner"></div></div>';
                allstarGrid.innerHTML = '<div class="loading-container"><div class="spinner"></div></div>';

                await Promise.all([loadKnock(), loadTeams(), loadSchedule(), loadNews(), loadAllstar()]);

                renderFeatured();
                renderTeams();
                renderTimeline();
                renderNews();
                renderSportsVideos();
                renderAllstarCards();

                if (!teamsData.length) teamsRow.innerHTML = '<div style="padding:40px; text-align:center;">⚡ 请创建 yhdleague-basketball.json</div>';
                if (!scheduleData.length) timelineContainer.innerHTML = '<div style="padding:40px; text-align:center;">⚡ 请创建 basketballschedule2026.json</div>';
                if (!newsData || !newsData.news || !newsData.news.length) newsTimeline.innerHTML = '<div style="padding:40px; text-align:center;">⚡ 请创建 yhdsports-news.json</div>';
                if (!knockData) sportsVideosGrid.innerHTML = '<div style="padding:40px; text-align:center;">⚡ 请确保 knockknock.json 存在</div>';
                if (!allstarData) allstarGrid.innerHTML = '<div style="padding:40px; text-align:center;">⚡ 请创建 yhdallstar2026.json</div>';
            }

            init();

            // 滚动隐藏顶部导航
            let lastScroll = 0;
            window.addEventListener('scroll', () => {
                const header = document.querySelector('.app-header');
                const current = window.pageYOffset;
                if (current <= 0) header?.classList.remove('hidden');
                else if (current > lastScroll && current > 80) header?.classList.add('hidden');
                else if (current < lastScroll) header?.classList.remove('hidden');
                lastScroll = current;
            });
        })();
    </script>
</body>
</html>
