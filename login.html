<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · YRTN+</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #FF3E4D;
            --secondary: #4A90E2;
            --dark: #1A1A2E;
            --light: #F8F9FA;
            --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
            --radius-md: 16px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
        }
        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
            font-family: inherit;
        }
        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,62,77,0.2);
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #e63e4d;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
        .error-msg {
            color: var(--primary);
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">YRTN+</div>
    <div class="tabs">
        <div class="tab active" data-tab="login">登录</div>
        <div class="tab" data-tab="register">注册</div>
    </div>
    <div id="login-form">
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="login-password" placeholder="密码" autocomplete="current-password">
        </div>
        <button id="login-btn">登录</button>
        <div id="login-error" class="error-msg"></div>
    </div>
    <div id="register-form" style="display: none;">
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="register-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>密码（至少6位）</label>
            <input type="password" id="register-password" placeholder="密码" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>昵称（可选）</label>
            <input type="text" id="register-username" placeholder="昵称" autocomplete="nickname">
        </div>
        <button id="register-btn">注册</button>
        <div id="register-error" class="error-msg"></div>
    </div>
    <div class="message">
        登录后即可评论新闻，享受更多互动体验
    </div>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回首页</a>
</div>

<script>
    // Supabase 配置（与首页保持一致）
    const SUPABASE_URL = 'https://uslzixbrazwuvrjhdgxy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzbHppeGJyYXp3dXZyamhkZ3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODExMDUsImV4cCI6MjA5Mjk1NzEwNX0.xiCB3qA3cciJRutHrv4DRi-hBvAQOiJRXhEmQA7TlmA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM 元素
    const tabs = document.querySelectorAll('.tab');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const loginError = document.getElementById('login-error');
    const registerError = document.getElementById('register-error');

    // 获取 redirect 参数（登录后跳转回原页面）
    function getRedirectUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let redirect = urlParams.get('redirect');
        if (redirect && !redirect.startsWith('http') && !redirect.startsWith('/')) {
            // 相对路径，保留原样
            return redirect;
        }
        return redirect || 'index.html';
    }

    // Tab 切换
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.dataset.tab;
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            if (target === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginError.textContent = '';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                registerError.textContent = '';
            }
        });
    });

    // 登录逻辑
    loginBtn.addEventListener('click', async () => {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        loginError.textContent = '';
        if (!email || !password) {
            loginError.textContent = '请填写邮箱和密码';
            return;
        }
        loginBtn.disabled = true;
        loginBtn.textContent = '登录中...';
        try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            // 登录成功，跳转到原页面
            const redirect = getRedirectUrl();
            window.location.href = redirect;
        } catch (err) {
            loginError.textContent = err.message || '登录失败，请检查邮箱和密码';
            loginBtn.disabled = false;
            loginBtn.textContent = '登录';
        }
    });

    // 注册逻辑
    registerBtn.addEventListener('click', async () => {
        const email = document.getElementById('register-email').value.trim();
        const password = document.getElementById('register-password').value;
        const username = document.getElementById('register-username').value.trim();
        registerError.textContent = '';
        if (!email || !password) {
            registerError.textContent = '请填写邮箱和密码';
            return;
        }
        if (password.length < 6) {
            registerError.textContent = '密码至少需要6位';
            return;
        }
        registerBtn.disabled = true;
        registerBtn.textContent = '注册中...';
        try {
            // 注册用户。注意：元数据中 username 会在触发器中被写入 profiles 表
            const { data, error } = await supabase.auth.signUp({
                email,
                password,
                options: {
                    data: { username: username || email.split('@')[0] }
                }
            });
            if (error) throw error;
            if (data.user?.identities?.length === 0) {
                registerError.textContent = '该邮箱已被注册，请直接登录';
                registerBtn.disabled = false;
                registerBtn.textContent = '注册';
                return;
            }
            // 注册成功，提示并切换到登录页
            alert('注册成功！请登录。');
            // 清空注册表单
            document.getElementById('register-email').value = '';
            document.getElementById('register-password').value = '';
            document.getElementById('register-username').value = '';
            // 切换到登录 tab
            const loginTab = document.querySelector('.tab[data-tab="login"]');
            if (loginTab) loginTab.click();
        } catch (err) {
            registerError.textContent = err.message || '注册失败，请稍后再试';
        } finally {
            registerBtn.disabled = false;
            registerBtn.textContent = '注册';
        }
    });

    // 如果已经登录，自动跳回原页面
    (async () => {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            const redirect = getRedirectUrl();
            window.location.href = redirect;
        }
    })();
</script>
</body>
</html>
