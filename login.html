<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · YRTN+</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #FF3E4D;
            --secondary: #4A90E2;
            --dark: #1A1A2E;
            --light: #F8F9FA;
            --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
            --radius-md: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
        }
        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,62,77,0.2);
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #e63e4d;
            transform: translateY(-2px);
        }
        .message {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
        .error-msg {
            color: var(--primary);
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">YRTN+</div>
    <div class="tabs">
        <div class="tab active" data-tab="login">登录</div>
        <div class="tab" data-tab="register">注册</div>
    </div>
    <div id="login-form">
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="login-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="login-password" placeholder="密码">
        </div>
        <button id="login-btn">登录</button>
        <div id="login-error" class="error-msg"></div>
    </div>
    <div id="register-form" style="display: none;">
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="register-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>密码（至少6位）</label>
            <input type="password" id="register-password" placeholder="密码">
        </div>
        <div class="form-group">
            <label>昵称（可选）</label>
            <input type="text" id="register-username" placeholder="昵称">
        </div>
        <button id="register-btn">注册</button>
        <div id="register-error" class="error-msg"></div>
    </div>
    <div class="message">
        登录后即可评论新闻
    </div>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回首页</a>
</div>

<script>
    const SUPABASE_URL = 'https://uslzixbrazwuvrjhdgxy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzbHppeGJyYXp3dXZyamhkZ3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODExMDUsImV4cCI6MjA5Mjk1NzEwNX0.xiCB3qA3cciJRutHrv4DRi-hBvAQOiJRXhEmQA7TlmA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Tab切换
    const tabs = document.querySelectorAll('.tab');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            if (tab.dataset.tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        });
    });

    // 登录
    document.getElementById('login-btn').addEventListener('click', async () => {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errorDiv = document.getElementById('login-error');
        if (!email || !password) {
            errorDiv.textContent = '请填写邮箱和密码';
            return;
        }
        errorDiv.textContent = '';
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            errorDiv.textContent = error.message;
        } else {
            // 登录成功，跳转回原页面
            const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
            window.location.href = redirect;
        }
    });

    // 注册
    document.getElementById('register-btn').addEventListener('click', async () => {
        const email = document.getElementById('register-email').value.trim();
        const password = document.getElementById('register-password').value;
        const username = document.getElementById('register-username').value.trim();
        const errorDiv = document.getElementById('register-error');
        if (!email || !password) {
            errorDiv.textContent = '请填写邮箱和密码';
            return;
        }
        if (password.length < 6) {
            errorDiv.textContent = '密码至少6位';
            return;
        }
        errorDiv.textContent = '';
        const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: { data: { username: username || email.split('@')[0] } }
        });
        if (error) {
            errorDiv.textContent = error.message;
        } else {
            if (data.user?.identities?.length === 0) {
                errorDiv.textContent = '该邮箱已被注册，请直接登录';
            } else {
                alert('注册成功！请登录。');
                // 切换到登录tab
                tabs[0].click();
            }
        }
    });
</script>
</body>
</html>
