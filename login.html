<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · YRTN+</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #FF3E4D;
            --secondary: #4A90E2;
            --dark: #1A1A2E;
            --light: #F8F9FA;
            --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
            --radius-md: 16px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
        }
        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
            font-family: inherit;
        }
        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,62,77,0.2);
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #e63e4d;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
        .error-msg {
            color: var(--primary);
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .debug-info {
            margin-top: 15px;
            font-size: 0.7rem;
            color: #aaa;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">YRTN+</div>
    <div class="tabs">
        <div class="tab active" data-tab="login">登录</div>
        <div class="tab" data-tab="register">注册</div>
    </div>
    <div id="login-form">
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="login-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="login-password" placeholder="密码">
        </div>
        <button id="login-btn">登录</button>
        <div id="login-error" class="error-msg"></div>
    </div>
    <div id="register-form" style="display: none;">
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="register-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>密码（至少6位）</label>
            <input type="password" id="register-password" placeholder="密码">
        </div>
        <div class="form-group">
            <label>昵称（可选）</label>
            <input type="text" id="register-username" placeholder="昵称">
        </div>
        <button id="register-btn">注册</button>
        <div id="register-error" class="error-msg"></div>
    </div>
    <div class="message">
        登录后即可评论新闻
    </div>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回首页</a>
    <div class="debug-info" id="debug-log">初始化中...</div>
</div>

<script>
    (function() {
        const debugDiv = document.getElementById('debug-log');
        function log(msg) {
            console.log(msg);
            if (debugDiv) debugDiv.innerHTML += '<br>✓ ' + msg;
        }
        function error(msg) {
            console.error(msg);
            if (debugDiv) debugDiv.innerHTML += '<br>❌ ' + msg;
        }
        
        log('页面加载，开始初始化 Supabase...');
        // Supabase 配置
        const SUPABASE_URL = 'https://uslzixbrazwuvrjhdgxy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzbHppeGJyYXp3dXZyamhkZ3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODExMDUsImV4cCI6MjA5Mjk1NzEwNX0.xiCB3qA3cciJRutHrv4DRi-hBvAQOiJRXhEmQA7TlmA';
        
        if (typeof window.supabase === 'undefined') {
            error('Supabase SDK 未加载！');
            return;
        }
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        log('Supabase 客户端创建成功');
        
        // 获取 redirect 参数
        function getRedirectUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            let redirect = urlParams.get('redirect');
            if (redirect && !redirect.startsWith('http') && !redirect.startsWith('/')) {
                return redirect;
            }
            return redirect || 'index.html';
        }
        
        // 如果已登录，自动跳转
        (async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                log('检测到已登录，自动跳转');
                window.location.href = getRedirectUrl();
            }
        })();
        
        // Tab 切换
        const tabs = document.querySelectorAll('.tab');
        const loginFormDiv = document.getElementById('login-form');
        const registerFormDiv = document.getElementById('register-form');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (target === 'login') {
                    loginFormDiv.style.display = 'block';
                    registerFormDiv.style.display = 'none';
                } else {
                    loginFormDiv.style.display = 'none';
                    registerFormDiv.style.display = 'block';
                }
            });
        });
        
        // 登录按钮
        const loginBtn = document.getElementById('login-btn');
        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            errorDiv.textContent = '';
            if (!email || !password) {
                errorDiv.textContent = '请填写邮箱和密码';
                return;
            }
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            log('尝试登录: ' + email);
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                log('登录成功');
                const redirect = getRedirectUrl();
                window.location.href = redirect;
            } catch (err) {
                errorDiv.textContent = err.message;
                error('登录失败: ' + err.message);
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });
        
        // 注册按钮
        const registerBtn = document.getElementById('register-btn');
        registerBtn.addEventListener('click', async () => {
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const username = document.getElementById('register-username').value.trim();
            const errorDiv = document.getElementById('register-error');
            errorDiv.textContent = '';
            if (!email || !password) {
                errorDiv.textContent = '请填写邮箱和密码';
                return;
            }
            if (password.length < 6) {
                errorDiv.textContent = '密码至少6位';
                return;
            }
            registerBtn.disabled = true;
            registerBtn.textContent = '注册中...';
            log('尝试注册: ' + email);
            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { username: username || email.split('@')[0] }
                    }
                });
                if (error) throw error;
                if (data.user?.identities?.length === 0) {
                    errorDiv.textContent = '该邮箱已被注册，请直接登录';
                    registerBtn.disabled = false;
                    registerBtn.textContent = '注册';
                    return;
                }
                log('注册成功，请登录');
                alert('注册成功！请登录。');
                // 清空并切换到登录
                document.getElementById('register-email').value = '';
                document.getElementById('register-password').value = '';
                document.getElementById('register-username').value = '';
                document.querySelector('.tab[data-tab="login"]').click();
            } catch (err) {
                errorDiv.textContent = err.message;
                error('注册失败: ' + err.message);
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = '注册';
            }
        });
        
        log('页面初始化完成，事件已绑定');
    })();
</script>
</body>
</html>
