<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>渊华德全明星周末 · 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-gold: #FFD966;
            --primary-cyan: #00E5FF;
            --primary-purple: #B026FF;
            --dark-bg: #0A0C10;
            --card-bg: rgba(20, 22, 36, 0.85);
            --text-light: #F0F0F0;
            --text-muted: #A0A5B0;
            --border-glow: rgba(0, 229, 255, 0.5);
            --shadow-neon: 0 0 20px rgba(0,229,255,0.3);
            --gradient-gold: linear-gradient(135deg, #FFD966, #FFA500);
            --gradient-cyan: linear-gradient(135deg, #00E5FF, #007BFF);
            --gradient-bg: radial-gradient(circle at 20% 30%, #1A1C2C, #0A0C10);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gradient-bg);
            color: var(--text-light);
            line-height: 1.5;
            overflow-x: hidden;
            padding-bottom: 60px;
        }
        /* 开屏动画 */
        .splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0A0C10; z-index: 9999; display: flex;
            align-items: center; justify-content: center; flex-direction: column;
            transition: opacity 1.2s ease, visibility 1.2s;
        }
        .splash-screen.hide { opacity: 0; visibility: hidden; }
        .splash-logo { font-size: 5rem; background: var(--gradient-cyan); -webkit-background-clip: text; background-clip: text; color: transparent; animation: pulseGlow 1.5s infinite alternate; }
        .splash-text { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; letter-spacing: 6px; margin-top: 20px; background: linear-gradient(135deg, #FFD966, #00E5FF); -webkit-background-clip: text; background-clip: text; color: transparent; }
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 0px rgba(0,229,255,0); transform: scale(1);}
            100% { text-shadow: 0 0 30px rgba(0,229,255,0.8); transform: scale(1.05);}
        }
        /* 星空背景 */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .star { position: absolute; background-color: white; border-radius: 50%; opacity: 0.6; animation: twinkle 3s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(1);} 100% { opacity: 1; transform: scale(1.2);} }
        /* 容器 */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        /* Hero */
        .hero { text-align: center; padding: 80px 20px 60px; position: relative; }
        .hero h1 { font-size: 5rem; font-family: 'Bebas Neue', cursive; background: linear-gradient(135deg, var(--primary-gold), var(--primary-cyan)); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 4px; }
        .hero .date-venue { font-size: 1.1rem; color: var(--text-muted); margin-top: 15px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .hero .date-venue i { margin-right: 8px; color: var(--primary-cyan); }
        /* 卡片 */
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(0, 229, 255, 0.3); border-radius: 24px; padding: 28px 24px; margin-bottom: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); transition: transform 0.3s, box-shadow 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 25px 45px rgba(0,0,0,0.4), 0 0 15px rgba(0,229,255,0.2); }
        .card-title { font-size: 2rem; font-weight: 800; margin-bottom: 25px; border-left: 6px solid var(--primary-cyan); padding-left: 20px; font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }
        .card-title i { margin-right: 12px; color: var(--primary-gold); }
        /* 比赛信息 */
        .game-meta { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; font-size: 0.9rem; color: var(--text-muted); }
        .game-meta i { width: 24px; color: var(--primary-cyan); }
        .scoreboard { text-align: center; margin: 20px 0; font-size: 2.5rem; font-weight: 800; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 20px; }
        .scoreboard span { margin: 0 20px; }
        .team-score { color: var(--primary-gold); }
        .mvp-badge { background: var(--gradient-gold); display: inline-block; padding: 4px 16px; border-radius: 40px; font-size: 0.8rem; font-weight: bold; color: #000; margin-top: 10px; }
        /* 关键球员表格 */
        .performers-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .performers-table th, .performers-table td { padding: 12px 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .performers-table th { color: var(--primary-cyan); }
        .highlight-text { font-size: 0.8rem; color: var(--primary-gold); }
        /* 文字直播 */
        .live-text-container { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; }
        .quarter-tabs { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .quarter-btn { background: rgba(0,0,0,0.5); border: none; color: var(--text-light); padding: 6px 16px; border-radius: 30px; cursor: pointer; transition: 0.2s; }
        .quarter-btn.active { background: var(--gradient-cyan); color: #000; font-weight: bold; }
        .quarter-content { display: none; }
        .quarter-content.active { display: block; }
        .event-list { list-style: none; max-height: 300px; overflow-y: auto; }
        .event-item { font-size: 0.85rem; margin-bottom: 12px; border-left: 3px solid var(--primary-cyan); padding-left: 12px; }
        .event-time { font-weight: bold; color: var(--primary-gold); margin-right: 10px; }
        /* 其他 */
        .stats-table { width: 100%; border-collapse: collapse; overflow-x: auto; display: block; }
        .stats-table th, .stats-table td { padding: 12px 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .stats-table th { color: var(--primary-cyan); }
        .contest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .contestant-card { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 16px; text-align: center; border: 1px solid rgba(0,229,255,0.2); }
        .champion-tag { background: var(--gradient-gold); display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: bold; color: #000; margin-top: 8px; }
        .highlights-list { list-style: none; }
        .highlights-list li { margin-bottom: 12px; padding-left: 24px; position: relative; }
        .highlights-list li:before { content: "⭐"; position: absolute; left: 0; color: var(--primary-gold); }
        .awards-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .award-item { background: linear-gradient(145deg, #2a2e45, #1a1c2c); border-radius: 40px; padding: 10px 20px; font-size: 0.9rem; border-left: 4px solid var(--primary-cyan); }
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.8rem; }
            .card-title { font-size: 1.5rem; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1c2c; }
        ::-webkit-scrollbar-thumb { background: var(--primary-cyan); border-radius: 10px; }
    </style>
</head>

        day2: null,
        day3: null
    };

    // 球队映射（用于显示队名，可选）
    let teamsMap = {};
    async function loadTeamsMap() {
        try {
            const res = await fetch('yhdleague-basketball.json');
            if (res.ok) {
                const teams = await res.json();
                teams.forEach(team => { teamsMap[team.id] = team.name; });
            }
        } catch(e) { console.warn("球队数据加载失败"); }
    }

    // 渲染文字直播（支持分节）
    function renderLiveText(liveText, sections) {
        let tabsHtml = '<div class="quarter-tabs">';
        let contentHtml = '';
        let first = true;
        for (let section of sections) {
            const events = liveText[section] || [];
            const activeClass = first ? 'active' : '';
            tabsHtml += `<button class="quarter-btn ${activeClass}" data-section="${section}">${section}</button>`;
            contentHtml += `<div class="quarter-content ${activeClass}" data-section="${section}"><ul class="event-list">`;
            if (events.length === 0) {
                contentHtml += '<li class="event-item">暂无事件</li>';
            } else {
                events.forEach(ev => {
                    contentHtml += `<li class="event-item"><span class="event-time">${ev.time}</span> ${ev.content}</li>`;
                });
            }
            contentHtml += `</ul></div>`;
            first = false;
        }
        tabsHtml += `</div>`;
        return `<div class="live-text-container">${tabsHtml}${contentHtml}</div>`;
    }

    // 渲染名人赛卡片

        const info = data.info;
        const performers = data.keyPerformers;
        const liveText = data.liveText;
        const sections = Object.keys(liveText); // ["Q1","Q2","Q3","Q4"]
        return `
            <div class="card">
                <div class="card-title"><i class="fas fa-star-of-life"></i> 全明星名人赛</div>
                <div class="game-meta">
                    <span><i class="far fa-clock"></i> ${info.time}</span>
                    <span><i class="fas fa-map-marker-alt"></i> ${info.venue}</span>
                </div>
                <div class="scoreboard">
                    <span class="team-score">${info.teams.teamA.name} ${info.teams.teamA.score}</span>
                    <span>-</span>
                    <span class="team-score">${info.teams.teamB.name} ${info.teams.teamB.score}</span>
                </div>
                <div class="mvp-badge"><i class="fas fa-trophy"></i> MVP: ${info.mvp.name} (${info.mvp.role})</div>
                <h3 style="margin: 20px 0 10px;">🌟 关键球员</h3>
                <table class="performers-table">
                    <thead><tr><th>球员</th><th>得分</th><th>篮板</th><th>助攻</th><th>高光</th></tr></thead>
                    <tbody>
                        ${performers.map(p => `<tr><td>${p.name}</td><td>${p.points}</td><td>${p.rebounds}</td><td>${p.assists}</td><td class="highlight-text">${p.highlight}</td></tr>`).join('')}
                    </tbody>
                </table>
                ${renderLiveText(liveText, sections)}
            </div>
        `;
    }

    // 渲染新秀挑战赛卡片

        const sections = Object.keys(liveText); // ["FirstHalf","SecondHalf"]
        return `

                    <span>-</span>

                </div>
                <div class="mvp-badge"><i class="fas fa-trophy"></i> MVP: ${info.mvp.name} (${info.mvp.points}分, ${info.mvp.team})</div>

    // 渲染整个页面（按日期顺序）
    async function renderAll() {

            for (let event of allStarData.day1.events) {
                if (event.type === 'celebrity') {
                    day1Html += renderCelebrityGame(event.data);
                } else if (event.type === 'risingStars') {
                    day1Html += renderRisingStars(event.data);
                }
            }
            day1Container.innerHTML = day1Html;
        } else {
            day1Container.innerHTML = '';
        }

        // Day2 预留（单项赛）

            // 同样方式渲染
        } else {
            day2Container.innerHTML = `<div class="card" style="text-align:center;"><div class="card-title"><i class="fas fa-calendar-day"></i> 4月11日 · 单项赛之夜</div><p>技巧挑战赛 · 三分大赛 · 扣篮大赛 — 即将揭晓</p></div>`;
        }

        // Day3 预留（正赛等）
        if (allStarData.day3 && allStarData.day3.events) {
            // 后续可添加
        } else {
            day3Container.innerHTML = `<div class="card" style="text-align:center;"><div class="card-title"><i class="fas fa-calendar-day"></i> 4月12日 · 全明星正赛</div><p>渊华德联队 vs 世界联队 — 巅峰对决即将上演</p></div>`;

    // 星空背景
    function initStars() {
        const starsContainer = document.getElementById('starsContainer');
        for(let i=0;i<150;i++) {

            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 5}s`;
            star.style.animationDuration = `${Math.random() * 3 + 2}s`;
            starsContainer.appendChild(star);
        }
    }

    // 文字直播选项卡交互
    function bindLiveTextTabs() {
        document.querySelectorAll('.quarter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const section = btn.dataset.section;
                const container = btn.closest('.live-text-container');
                container.querySelectorAll('.quarter-btn').forEach(b => b.classList.remove('active'));
                container.querySelectorAll('.quarter-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                container.querySelector(`.quarter-content[data-section="${section}"]`).classList.add('active');
            });
        });
    }

    window.addEventListener('load', async () => {
        initStars();
        await renderAll();
        bindLiveTextTabs();
        // 开屏动画消失
        setTimeout(() => {
            const splash = document.getElementById('splash');
            splash.classList.add('hide');
            setTimeout(() => splash.style.display = 'none', 1200);
        }, 1800);
    });
</script>
</body>
</html>
