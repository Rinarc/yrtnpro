<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开屏动画测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            transition: opacity 0.6s ease;
        }
        .splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .content { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; }
        .loading { text-align: center; padding: 40px; }
        .news-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .news-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 5px; }
        .news-meta { font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>
<div class="splash-screen" id="splashScreen">
    <div>YRTN+</div>
</div>
<div class="content" id="mainContent" style="display: none;">
    <h1>最新新闻</h1>
    <div id="newsList"></div>
</div>

<script>
    // 开屏动画：多重保障，确保隐藏
    (function() {
        var splash = document.getElementById('splashScreen');
        if (!splash) return;
        var hide = function() {
            splash.classList.add('hidden');
        };
        // 延迟 1.5 秒后隐藏
        setTimeout(hide, 1500);
        // 页面完全加载后也隐藏（保险）
        window.addEventListener('load', hide);
        // 点击任意位置也隐藏
        splash.addEventListener('click', hide);
    })();

    // Supabase 配置（仅用于测试新闻加载）
    const SUPABASE_URL = 'https://uslzixbrazwuvrjhdgxy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzbHppeGJyYXp3dXZyamhkZ3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODExMDUsImV4cCI6MjA5Mjk1NzEwNX0.xiCB3qA3cciJRutHrv4DRi-hBvAQOiJRXhEmQA7TlmA';

    async function loadNews() {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/news?select=title,date,category&order=date.desc&limit=5`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            if (!response.ok) throw new Error('网络错误');
            const articles = await response.json();
            const container = document.getElementById('newsList');
            if (articles.length === 0) {
                container.innerHTML = '<p>暂无新闻</p>';
            } else {
                container.innerHTML = articles.map(a => `
                    <div class="news-item">
                        <div class="news-title">${escapeHtml(a.title)}</div>
                        <div class="news-meta">${a.category} · ${new Date(a.date).toLocaleDateString()}</div>
                    </div>
                `).join('');
            }
            document.getElementById('mainContent').style.display = 'block';
        } catch (err) {
            console.error(err);
            document.getElementById('newsList').innerHTML = '<p>加载失败，请检查网络</p>';
            document.getElementById('mainContent').style.display = 'block';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadNews();
</script>
</body>
</html>
