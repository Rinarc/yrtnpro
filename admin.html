<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻管理后台 | YRTN+</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f2f5;
            color: #1e293b;
            min-height: 100vh;
        }
        /* 遮罩层，权限验证时显示 */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            font-size: 1.2rem;
            color: #FF3E4D;
            flex-direction: column;
            gap: 15px;
        }
        .auth-overlay.hidden {
            display: none;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: none; /* 默认隐藏，验证通过后显示 */
        }
        /* 其余样式不变（略，实际代码中会保留所有样式） */
        /* 以下复制之前的完整样式，为避免重复省略，但在最终版本中会包含全部样式 */
        /* ... 完整样式 ... */
    </style>
</head>
<body>
<div id="auth-overlay" class="auth-overlay">
    <i class="fas fa-spinner fa-pulse fa-2x"></i>
    <div>正在验证管理员权限...</div>
</div>
<div id="admin-container" class="admin-container">
    <!-- 整个后台内容 -->
    <div class="admin-header">
        <div class="logo-area">
            <div class="logo">Y</div>
            <div class="logo-text">YRTN+ 管理后台</div>
        </div>
        <div class="user-area">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar"></div>
                <span id="user-name"></span>
            </div>
            <button class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
    </div>
    <div class="admin-grid">
        <div class="form-card">
            <div class="card-header">
                <i class="fas fa-pen-alt"></i> 
                <span id="form-title">发布新新闻</span>
            </div>
            <div class="form-body">
                <div id="form-error" class="error-message" style="display: none;"></div>
                <form id="news-form">
                    <input type="hidden" id="edit-id" value="">
                    <div class="form-group">
                        <label>标题 *</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>摘要（信源）</label>
                        <input type="text" id="summary" placeholder="例如：信源：渊迂地铁">
                    </div>
                    <div class="form-group">
                        <label>正文（支持HTML） *</label>
                        <textarea id="content" rows="6" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>图片URL *</label>
                        <input type="url" id="image" required>
                    </div>
                    <div class="form-group">
                        <label>分类 *</label>
                        <select id="category" required>
                            <option value="交通">交通</option>
                            <option value="民生">民生</option>
                            <option value="科技">科技</option>
                            <option value="渊华德互联">渊华德互联</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>英文标题（可选）</label>
                        <input type="text" id="title_en">
                    </div>
                    <div class="form-group">
                        <label>英文正文（可选）</label>
                        <textarea id="content_en" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>AI总结（可选）</label>
                        <textarea id="ai_summary" rows="2"></textarea>
                    </div>
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="is_breaking">
                        <label>设为头条新闻</label>
                    </div>
                    <button type="submit" class="submit-btn" id="submit-btn">发布新闻</button>
                    <button type="button" class="submit-btn" id="cancel-edit" style="background: #64748b; margin-top: 10px; display: none;">取消编辑</button>
                </form>
            </div>
        </div>
        <div class="list-card">
            <div class="card-header">
                <i class="fas fa-newspaper"></i> 所有新闻
            </div>
            <div class="form-body">
                <div class="list-header">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="搜索标题...">
                        <button id="search-btn"><i class="fas fa-search"></i></button>
                    </div>
                    <button id="refresh-btn" style="background: #f1f5f9; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer;"><i class="fas fa-sync-alt"></i> 刷新</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="news-table" id="news-table">
                        <thead><tr><th>ID</th><th>标题</th><th>分类</th><th>头条</th><th>操作</th></tr></thead>
                        <tbody id="news-list-body"><tr><td colspan="5" style="text-align:center;">加载中...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="delete-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>确认删除</h3><button class="close-modal">&times;</button></div>
        <p>确定要删除这篇新闻吗？此操作不可恢复。</p>
        <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 25px;">
            <button id="confirm-delete" style="background: #FF3E4D; color: white; border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer;">删除</button>
            <button id="cancel-delete" style="background: #cbd5e1; border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer;">取消</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://uslzixbrazwuvrjhdgxy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzbHppeGJyYXp3dXZyamhkZ3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODExMDUsImV4cCI6MjA5Mjk1NzEwNX0.xiCB3qA3cciJRutHrv4DRi-hBvAQOiJRXhEmQA7TlmA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let newsList = [];
    let deleteId = null;
    let editId = null;

    const overlay = document.getElementById('auth-overlay');
    const adminContainer = document.getElementById('admin-container');

    async function checkAuthAndAdmin() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            // 未登录，跳转登录页，并记住当前页面
            window.location.href = `login.html?redirect=admin.html`;
            return false;
        }
        currentUser = user;
        const { data: profile, error } = await supabase
            .from('profiles')
            .select('role, username')
            .eq('id', user.id)
            .single();
        if (error || !profile || profile.role !== 'admin') {
            overlay.innerHTML = '<div style="color:#FF3E4D;"><i class="fas fa-ban fa-2x"></i><br>您没有管理员权限，请联系站长。</div>';
            setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            return false;
        }
        // 验证通过，显示后台内容
        overlay.classList.add('hidden');
        adminContainer.style.display = 'block';
        // 显示用户名
        const username = profile.username || user.email.split('@')[0];
        document.getElementById('user-name').textContent = username;
        document.getElementById('user-avatar').textContent = username.charAt(0).toUpperCase();
        // 加载新闻列表
        loadNewsList();
        return true;
    }

    async function loadNewsList(searchTerm = '') {
        let url = `${SUPABASE_URL}/rest/v1/news?select=*&order=date.desc`;
        if (searchTerm) {
            url = `${SUPABASE_URL}/rest/v1/news?select=*&order=date.desc&title=ilike.%${encodeURIComponent(searchTerm)}%`;
        }
        const response = await fetch(url, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
        });
        if (response.ok) {
            newsList = await response.json();
            renderNewsTable(newsList);
        } else {
            document.getElementById('news-list-body').innerHTML = '<tr><td colspan="5">加载失败</td></tr>';
        }
    }

    function renderNewsTable(articles) {
        const tbody = document.getElementById('news-list-body');
        if (!articles.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">暂无新闻</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        articles.forEach(article => {
            const tr = document.createElement('tr');
            tr.setAttribute('data-id', article.id);
            tr.innerHTML = `
                <td data-label="ID">${article.id}</td>
                <td data-label="标题">${article.title.length > 40 ? article.title.substring(0,40)+'...' : article.title}</td>
                <td data-label="分类">${article.category}</td>
                <td data-label="头条">${article.is_breaking ? '<span class="status-badge">头条</span>' : ''}</td>
                <td data-label="操作" class="table-actions">
                    <button class="edit-btn" data-id="${article.id}"><i class="fas fa-edit"></i></button>
                    <button class="delete-btn" data-id="${article.id}"><i class="fas fa-trash-alt"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
        // 绑定编辑删除事件
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.onclick = () => openEditModal(parseInt(btn.dataset.id));
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = () => openDeleteModal(parseInt(btn.dataset.id));
        });
    }

    function openEditModal(id) {
        const article = newsList.find(a => a.id === id);
        if (!article) return;
        editId = article.id;
        document.getElementById('edit-id').value = article.id;
        document.getElementById('title').value = article.title;
        document.getElementById('summary').value = article.summary || '';
        document.getElementById('content').value = article.content;
        document.getElementById('image').value = article.image;
        document.getElementById('category').value = article.category;
        document.getElementById('title_en').value = article.title_en || '';
        document.getElementById('content_en').value = article.content_en || '';
        document.getElementById('ai_summary').value = article.ai_summary || '';
        document.getElementById('is_breaking').checked = article.is_breaking || false;
        document.getElementById('form-title').innerHTML = '<i class="fas fa-edit"></i> 编辑新闻';
        document.getElementById('submit-btn').textContent = '更新新闻';
        document.getElementById('cancel-edit').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
        editId = null;
        document.getElementById('edit-id').value = '';
        document.getElementById('news-form').reset();
        document.getElementById('form-title').innerHTML = '<i class="fas fa-pen-alt"></i> 发布新新闻';
        document.getElementById('submit-btn').textContent = '发布新闻';
        document.getElementById('cancel-edit').style.display = 'none';
        document.getElementById('form-error').style.display = 'none';
    }

    async function submitNews(e) {
        e.preventDefault();
        const data = {
            title: document.getElementById('title').value.trim(),
            summary: document.getElementById('summary').value.trim(),
            content: document.getElementById('content').value,
            image: document.getElementById('image').value.trim(),
            category: document.getElementById('category').value,
            title_en: document.getElementById('title_en').value.trim() || null,
            content_en: document.getElementById('content_en').value.trim() || null,
            ai_summary: document.getElementById('ai_summary').value.trim() || null,
            is_breaking: document.getElementById('is_breaking').checked,
            date: new Date().toISOString()
        };
        if (!data.title || !data.content || !data.image) {
            const errDiv = document.getElementById('form-error');
            errDiv.textContent = '请填写标题、正文和图片URL';
            errDiv.style.display = 'block';
            setTimeout(() => errDiv.style.display = 'none', 3000);
            return;
        }
        try {
            if (editId) {
                const { error } = await supabase.from('news').update(data).eq('id', editId);
                if (error) throw error;
                alert('新闻已更新');
                cancelEdit();
            } else {
                const newId = Date.now();
                const { error } = await supabase.from('news').insert({ ...data, id: newId });
                if (error) throw error;
                alert('新闻已发布');
                document.getElementById('news-form').reset();
            }
            loadNewsList(document.getElementById('search-input').value);
        } catch (err) {
            const errDiv = document.getElementById('form-error');
            errDiv.textContent = '操作失败: ' + err.message;
            errDiv.style.display = 'block';
            setTimeout(() => errDiv.style.display = 'none', 5000);
        }
    }

    function openDeleteModal(id) {
        deleteId = id;
        document.getElementById('delete-modal').classList.add('active');
    }

    async function confirmDelete() {
        if (!deleteId) return;
        const { error } = await supabase.from('news').delete().eq('id', deleteId);
        if (error) alert('删除失败: ' + error.message);
        else {
            alert('删除成功');
            loadNewsList(document.getElementById('search-input').value);
        }
        document.getElementById('delete-modal').classList.remove('active');
        deleteId = null;
    }

    function closeModal() {
        document.getElementById('delete-modal').classList.remove('active');
    }

    async function logout() {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
    }

    // 页面启动
    window.onload = async () => {
        const authorized = await checkAuthAndAdmin();
        if (!authorized) return;
        // 绑定事件
        document.getElementById('news-form').addEventListener('submit', submitNews);
        document.getElementById('cancel-edit').addEventListener('click', cancelEdit);
        document.getElementById('search-btn').addEventListener('click', () => loadNewsList(document.getElementById('search-input').value));
        document.getElementById('refresh-btn').addEventListener('click', () => loadNewsList(document.getElementById('search-input').value));
        document.getElementById('logout-btn').addEventListener('click', logout);
        document.querySelectorAll('.close-modal, #cancel-delete').forEach(btn => btn.addEventListener('click', closeModal));
        document.getElementById('confirm-delete').addEventListener('click', confirmDelete);
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('delete-modal')) closeModal();
        });
    };
</script>
</body>
</html>
