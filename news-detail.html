<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻详情 | YRTN+</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #FF3E4D;
            text-decoration: none;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #666;
        }
        .error {
            background: #ffe0e0;
            border-left: 4px solid #FF3E4D;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            color: #b00020;
        }
        .news-title {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        .meta {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .category {
            background: #FF3E4D;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .featured-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin: 20px 0;
        }
        .content {
            line-height: 1.8;
            font-size: 1rem;
        }
        .ai-summary {
            background: #fff3e0;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border-left: 4px solid #FFA630;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回主页</a>
    <div id="loading" class="loading">加载新闻中...</div>
    <div id="error" class="error" style="display: none;"></div>
    <div id="contentArea" style="display: none;">
        <h1 id="newsTitle" class="news-title"></h1>
        <div class="meta">
            <span><i class="far fa-calendar-alt"></i> <span id="newsDate"></span></span>
            <span><span id="newsCategory" class="category"></span></span>
            <span><i class="fas fa-source"></i> 信源：<span id="newsSource"></span></span>
        </div>
        <div id="aiSummary" class="ai-summary" style="display: none;"></div>
        <img id="newsImage" class="featured-image" style="display: none;">
        <div id="newsContent" class="content"></div>
    </div>
</div>

<script>
    // Supabase 配置
    const SUPABASE_URL = 'https://uslzixbrazwuvrjhdgxy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzbHppeGJyYXp3dXZyamhkZ3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODExMDUsImV4cCI6MjA5Mjk1NzEwNX0.xiCB3qA3cciJRutHrv4DRi-hBvAQOiJRXhEmQA7TlmA';

    function getUrlParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function loadNews() {
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const contentDiv = document.getElementById('contentArea');
        try {
            const articleId = getUrlParam('id');
            if (!articleId) throw new Error('缺少新闻ID参数');
            const url = `${SUPABASE_URL}/rest/v1/news?id=eq.${articleId}&select=*`;
            const response = await fetch(url, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            const data = await response.json();
            if (!data || data.length === 0) throw new Error('未找到该新闻');
            const article = data[0];

            // 填充内容
            document.getElementById('newsTitle').textContent = article.title;
            document.getElementById('newsDate').textContent = formatDate(article.date);
            document.getElementById('newsCategory').textContent = article.category;
            const sourceText = article.summary ? article.summary.split('：')[1] || article.summary : '渊迂电视新闻网';
            document.getElementById('newsSource').textContent = sourceText;
            if (article.ai_summary && article.ai_summary.trim()) {
                document.getElementById('aiSummary').innerHTML = `<strong>🤖 AI总结</strong><br>${article.ai_summary}`;
                document.getElementById('aiSummary').style.display = 'block';
            }
            if (article.image) {
                const img = document.getElementById('newsImage');
                img.src = article.image;
                img.style.display = 'block';
            }
            document.getElementById('newsContent').innerHTML = article.content;

            loadingDiv.style.display = 'none';
            contentDiv.style.display = 'block';
        } catch (err) {
            loadingDiv.style.display = 'none';
            errorDiv.textContent = `加载失败：${err.message}`;
            errorDiv.style.display = 'block';
        }
    }

    loadNews();
</script>
</body>
</html>
